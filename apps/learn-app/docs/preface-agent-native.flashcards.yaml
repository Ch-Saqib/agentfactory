deck:
  id: "preface-agent-native"
  title: "PREFACE: The AI Agent Factory"
  description: "Core concepts from the preface — the SaaSpocalypse, Digital FTEs, the Agent Triangle, monetization models, and the spec-driven blueprint for building AI employees."
  tags: ["preface", "agent-factory", "digital-fte", "part-0"]
  version: 2

cards:
  - id: "preface-001"
    front: "Anthropic released eleven open-source plugins for Claude Cowork in January 2026. What was the market's response, and why?"
    back: "Nearly $1 trillion in software stock value was erased over six sessions. Traders called it the SaaSpocalypse because autonomous agents proved they could perform the complex professional work that justified $200/month SaaS subscriptions."
    tags: ["saaspocalypse", "market-event"]
    difficulty: "intermediate"
    why: "Why did open-source plugins — not proprietary ones — trigger this repricing?"

  - id: "preface-002"
    front: "A company deploys AI agents that handle contract review, compliance tracking, and financial analysis. According to the preface, which four scenarios should still be kept away from agents?"
    back: "1. Irreversible high-stakes decisions (medical diagnoses, legal judgments, large financial approvals) without human review\n2. Undefined success criteria\n3. Relationship-critical interactions (executive comms, crisis management, sensitive HR)\n4. Unstable data environments"
    tags: ["safety", "deployment"]
    difficulty: "advanced"
    why: "Why does undefined success criteria make agent deployment dangerous even when the agent is technically capable?"

  - id: "preface-003"
    front: "Old SaaS model vs. Digital FTE model: how does scaling differ?"
    back: "Old: Linear — hire more humans, buy more seats.\nNew: Exponential — clone the agent instantly.\nDigital FTEs need no seat, no UI, and no training period."
    tags: ["paradigm-shift", "scaling"]
    difficulty: "intermediate"
    why: "What happens to SaaS companies whose revenue depends on headcount growth?"

  - id: "preface-004"
    front: "A company's software spend keeps rising but output stays flat. According to the preface, what strategic pivot should they make?"
    back: "Three steps: (1) Stop buying seats, (2) Build Skills — encode domain expertise into agent capabilities, (3) Deploy Digital FTEs — reinvest savings into an autonomous workforce."
    tags: ["disruption-alpha", "strategy"]
    difficulty: "advanced"
    why: "Why does the preface call domain expertise encoded in skills a 'competitive moat'?"

  - id: "preface-005"
    front: "What does the preface mean by 'Disruption Alpha'?"
    back: "The opportunity gap between the old world dying (legacy SaaS losing valuation) and the new world scaling (firms building Digital FTEs capturing that lost value)."
    tags: ["disruption-alpha", "strategy"]
    difficulty: "intermediate"

  - id: "preface-006"
    front: "An accountant with no programming background wants to build an AI agent. According to the preface, what is now the primary interface for building software?"
    back: "Natural language — English, Urdu, Spanish, whatever you think in. You describe the job; Claude Code interprets your instructions and builds the solution."
    tags: ["coding-barrier", "accessibility"]
    difficulty: "basic"

  - id: "preface-007"
    front: "Thomson Reuters acquired Casetext for $650 million in 2023. What were they really paying for?"
    back: "Encoded legal expertise — the ability to do substantive legal work (document review, case research, memo drafting) that previously required expensive human professionals. CoCounsel achieved a 97% pass rate on complex legal evaluations."
    tags: ["cocounsel", "proof-point"]
    difficulty: "intermediate"
    why: "How does the CoCounsel acquisition connect to the SaaSpocalypse three years later?"

  - id: "preface-008"
    front: "The Agent Triangle presents three paths to agentic automation. What are they?"
    back: "Path A: General Agents (consultants — state the goal)\nPath B: Custom-Built AI Employees (build — architect the workflow)\nPath C: Pre-Built AI Employees (buy — configure and onboard)"
    tags: ["agent-triangle", "deployment"]
    difficulty: "basic"

  - id: "preface-009"
    front: "A startup needs an always-on sales assistant with persistent memory across Slack and WhatsApp. Which Agent Triangle path fits best, and why?"
    back: "Path C — Pre-Built AI Employees (Buy). Cross-platform automation, persistent memory, and proactive action are priorities that match the Buy path. Building custom would take weeks; pre-built can be operational in days."
    tags: ["agent-triangle", "decision-framework"]
    difficulty: "advanced"
    why: "When would this startup need to switch from Buy to Build?"

  - id: "preface-010"
    front: "Build (Path B) vs. Buy (Path C) in the Agent Triangle"
    back: "Build: You are the architect — define every guardrail, hand-off, and orchestration step.\nBuy: You are the manager — they come pre-trained, you onboard them to your systems."
    tags: ["agent-triangle", "build-vs-buy"]
    difficulty: "intermediate"

  - id: "preface-011"
    front: "What reasoning framework separates General Agents from simple prediction engines?"
    back: "The OODA loop — Observe the problem, Orient around constraints, Decide on an approach, Act by writing code or running commands — repeating until the problem is solved."
    tags: ["general-agents", "reasoning"]
    difficulty: "intermediate"
    why: "Why is the correction step (repeating the loop) essential to making agents reliable?"

  - id: "preface-012"
    front: "Why does the preface call Claude Code the 'Trojan Horse' of AI?"
    back: "Calling it a Coding Agent understates its capabilities — code is simply the tool it uses to solve any business problem. Like calling a CEO an Email Writer because they use email."
    tags: ["general-agents", "claude-code"]
    difficulty: "basic"

  - id: "preface-013"
    front: "Two standards make the Agent Factory possible. What are they and what role does each play?"
    back: "Agent Skills = the How-To (modular SKILL.md files teaching specific workflows).\nMCP = the With-What (universal protocol connecting skills to live data like CRMs, databases, APIs)."
    tags: ["twin-enablers", "skills", "mcp"]
    difficulty: "intermediate"
    why: "What happens if you have skills but no MCP connectivity?"

  - id: "preface-014"
    front: "The Agent Factory operates two production lines. What are they?"
    back: "Line 1: Custom Manufacturing (Build) — spec + Claude Code generates the agent.\nLine 2: Strategic Procurement (Buy) — evaluate and onboard pre-built AI employees.\nGeneral Agents power both lines."
    tags: ["agent-factory", "production"]
    difficulty: "basic"

  - id: "preface-015"
    front: "Human FTE vs. Digital FTE: how do availability, cost, ramp-up, and scaling compare?"
    back: "Availability: 40 hrs/week vs 168 hrs/week (24/7)\nCost: $4,000-8,000+/mo vs $500-2,000/mo\nRamp-up: 3-6 months vs instant deployment\nScaling: Linear (hire 10 for 10x) vs Exponential (clone instantly)"
    tags: ["digital-fte", "comparison"]
    difficulty: "intermediate"
    why: "Why does instant cloning make the scaling difference exponential rather than just faster?"

  - id: "preface-016"
    front: "A founder prices their AI agent as a $50/month software subscription. What pricing psychology mistake are they making?"
    back: "They're competing against IT budgets (small, strict) instead of HR/departmental budgets (often 10x larger). Positioning as a Digital FTE means being compared to a $50,000 salary, not a $50 subscription."
    tags: ["monetization", "pricing"]
    difficulty: "advanced"
    why: "Why does a CEO care about tasks completed rather than tokens consumed?"

  - id: "preface-017"
    front: "What are the four monetization models for Digital FTEs?"
    back: "1. Subscription ($500-2,000/mo for managed FTE)\n2. Success Fee (commission on results)\n3. License (annual fee for proprietary agent logic)\n4. Marketplace (sell via platforms like OpenAI Apps)"
    tags: ["monetization", "business-model"]
    difficulty: "basic"

  - id: "preface-018"
    front: "Before deploying an agent, what evaluation must it pass and at what threshold?"
    back: "A Golden Dataset — 50+ real-world scenarios representing actual work. The agent must achieve 97%+ accuracy for production deployment, using semantic similarity scoring and regression testing."
    tags: ["evaluation", "deployment"]
    difficulty: "intermediate"
    why: "Why is semantic similarity scoring better than simple pass/fail for agent evaluation?"

  - id: "preface-019"
    front: "A company wants to deploy an AI agent into production immediately. What deployment rule does the preface prescribe?"
    back: "Start with shadow mode — the agent recommends but humans execute. Graduate to full autonomy only after 95%+ accuracy over 30 days."
    tags: ["deployment", "safety"]
    difficulty: "intermediate"

  - id: "preface-020"
    front: "80% of AI agent failures stem from what source?"
    back: "Organizational issues, not technical ones. The five pitfalls: over-automating too fast, ignoring edge cases, no monitoring, underestimating change management, and no success metrics defined."
    tags: ["pitfalls", "deployment"]
    difficulty: "intermediate"
    why: "Why does underestimating change management cause more failures than technical bugs?"

  - id: "preface-021"
    front: "A methodology where your specification IS your source code, and describing excellence lets AI build the agent, skills, and MCP to deliver it"
    back: "The golden rule of the Agent Factory: In the era of Agents, your Spec is your Source Code."
    tags: ["golden-rule", "spec-driven"]
    difficulty: "intermediate"

  - id: "preface-022"
    front: "An AI suggests design patterns you didn't know, learns your company's domain terminology over time, and handles implementation while you sleep. What partnership model does this describe?"
    back: "The Three-Role Partnership — AI as Teacher (suggests patterns, explains tradeoffs), Student (learns your domain, adapts to preferences), and Co-Worker (handles implementation around the clock)."
    tags: ["partnership", "collaboration"]
    difficulty: "intermediate"

  - id: "preface-023"
    front: "Enterprise Architecture Shift: how does knowledge change from tool-centric to agent-centric?"
    back: "From undocumented and unscalable (lives in people's heads) to reusable intellectual property (encoded in Specs and Skills)."
    tags: ["enterprise", "architecture"]
    difficulty: "intermediate"
    why: "Why is undocumented knowledge a liability in the agent era?"

  - id: "preface-024"
    front: "You ask an agent 'Why did sales drop in Q3?' and it writes SQL, runs Python visualization, analyzes the chart, and answers with data. What concept does this illustrate?"
    back: "Code as the Universal Interface — agents use code not to build apps but to interrogate reality and answer business questions with facts. Code is the interface between intent and action."
    tags: ["code-as-interface", "general-agents"]
    difficulty: "advanced"

  - id: "preface-025"
    front: "The development path follows two stages. What are they and what metaphor describes the progression?"
    back: "Stage 1: Incubator (General Agents — explore and discover).\nStage 2: Specialist (Custom Agents — engineered for reliability and scale).\nMetaphor: biological evolution — incubate possibilities, then specialize once patterns stabilize."
    tags: ["development-path", "maturity-model"]
    difficulty: "intermediate"
    why: "What goes wrong if you skip incubation and try to engineer a specialist from scratch?"
