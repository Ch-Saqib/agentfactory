deck:
  id: "ch03-safety-limitations"
  title: "Safety, Limitations, and What's Coming"
  description: "Flashcards covering Cowork safety practices, current limitations, workarounds, and upcoming features like Knowledge Bases and Unified UI."
  tags: ["cowork", "safety", "limitations", "roadmap", "prompt-injection"]
  version: 1

cards:
  # --- RECALL CARDS (11) ---

  - id: "ch03-safety-limitations-001"
    type: recall
    front: "What is the primary security boundary when using Claude Cowork?"
    back: "Folder access — granting access only to specific project folders."
    tags: ["safety", "workspace"]
    difficulty: "basic"

  - id: "ch03-safety-limitations-002"
    type: recall
    front: "What is prompt injection in the context of Claude Cowork?"
    back: "Content in files that attempts to manipulate Claude's behavior."
    tags: ["safety", "prompt-injection"]
    difficulty: "basic"

  - id: "ch03-safety-limitations-003"
    type: recall
    front: "What are the four red flags to watch for in Cowork's approval workflow?"
    back: "Deleting unmentioned files\nModifying more files than expected\nOperations on unapproved folders\nNetwork requests to unknown destinations"
    tags: ["safety", "approval-workflow"]
    difficulty: "intermediate"

  - id: "ch03-safety-limitations-004"
    type: recall
    front: "What three steps should you take before running a bulk file operation in Cowork?"
    back: "Back up the target folder\nTest on a small sample first\nVerify results before scaling up"
    tags: ["safety", "backup"]
    difficulty: "basic"

  - id: "ch03-safety-limitations-005"
    type: recall
    front: "What happens to Claude's memory between Cowork sessions?"
    back: "It resets completely — each session starts fresh with no memory."
    tags: ["limitations", "memory"]
    difficulty: "basic"

  - id: "ch03-safety-limitations-006"
    type: recall
    front: "What is the recommended workaround for Cowork's lack of project support?"
    back: "Create a project-context.md file with project description, conventions, and common instructions."
    tags: ["limitations", "workaround"]
    difficulty: "intermediate"

  - id: "ch03-safety-limitations-007"
    type: recall
    front: "What operating system does Claude Cowork currently support?"
    back: "macOS only, with Windows support in development."
    tags: ["limitations", "platform"]
    difficulty: "basic"

  - id: "ch03-safety-limitations-008"
    type: recall
    front: "What will Knowledge Bases allow Cowork users to do?"
    back: "Index documents for persistent retrieval\nQuery across all documents\nMaintain context across sessions"
    tags: ["roadmap", "knowledge-bases"]
    difficulty: "intermediate"

  - id: "ch03-safety-limitations-009"
    type: recall
    front: "What does the upcoming Unified UI feature combine?"
    back: "Terminal-based Claude Code and desktop-based Cowork into one seamless interface."
    tags: ["roadmap", "unified-ui"]
    difficulty: "intermediate"

  - id: "ch03-safety-limitations-010"
    type: recall
    front: "What approximate file size may cause processing issues in Cowork?"
    back: "Documents over 50MB."
    tags: ["limitations", "file-size"]
    difficulty: "basic"

  - id: "ch03-safety-limitations-011"
    type: recall
    front: "What is the recommended workaround for maintaining context between Cowork sessions?"
    back: "Summarize work in a notes file; have Claude read it next session."
    tags: ["limitations", "workaround", "memory"]
    difficulty: "intermediate"

  # --- THINKING CARDS (11) ---

  - id: "ch03-safety-limitations-012"
    type: thinking
    front: "Why is granting home directory access to Cowork dangerous?"
    back: "BECAUSE your home directory contains sensitive personal, financial, and confidential files, THEREFORE a broad file operation like 'organize and delete old files' could accidentally destroy or expose critical data."
    why: "Connects folder scope to real-world data loss risk."
    tags: ["safety", "workspace"]
    difficulty: "intermediate"

  - id: "ch03-safety-limitations-013"
    type: thinking
    front: "Why is prompt injection relevant even for non-technical users?"
    back: "BECAUSE any file from an untrusted source — email attachments, downloaded templates — can contain hidden instructions, THEREFORE prompt injection is an everyday risk, not just a hacker technique."
    why: "Challenges the assumption that only hackers exploit prompt injection."
    tags: ["safety", "prompt-injection"]
    difficulty: "intermediate"

  - id: "ch03-safety-limitations-014"
    type: thinking
    front: "Why should you start with read-only access for unknown content?"
    back: "BECAUSE unknown files might contain prompt injection attempts, THEREFORE read-only access limits potential damage while you assess whether the content is safe to act on."
    why: "Links access restrictions to defense-in-depth thinking."
    tags: ["safety", "prompt-injection"]
    difficulty: "intermediate"

  - id: "ch03-safety-limitations-015"
    type: thinking
    front: "How does the approval workflow function as a safety net?"
    back: "BECAUSE every file operation requires explicit user approval, THEREFORE users can catch unexpected deletions, excessive modifications, or unapproved folder access before damage occurs."
    why: "Explains the human-in-the-loop design principle."
    tags: ["safety", "approval-workflow"]
    difficulty: "intermediate"

  - id: "ch03-safety-limitations-016"
    type: thinking
    front: "Why is learning Cowork patterns now valuable despite upcoming features?"
    back: "BECAUSE the mental model of agentic AI, filesystem access, Skills, and approval workflows persists across updates, THEREFORE current practice builds transferable expertise for future capabilities."
    why: "Addresses whether investing time now is worthwhile."
    tags: ["roadmap", "learning"]
    difficulty: "advanced"

  - id: "ch03-safety-limitations-017"
    type: thinking
    front: "How would Knowledge Bases change multi-session workflows?"
    back: "BECAUSE persistent retrieval replaces manual context re-establishment, THEREFORE users could reference past decisions and documents without creating workaround files or re-explaining project history each session."
    why: "Contrasts current manual handoff with automated context."
    tags: ["roadmap", "knowledge-bases"]
    difficulty: "advanced"

  - id: "ch03-safety-limitations-018"
    type: thinking
    front: "Why does no persistent memory make Cowork safer in some ways?"
    back: "BECAUSE each session starts completely fresh, THEREFORE a compromised or manipulated session cannot carry its effects into future sessions — the blast radius is limited to one conversation."
    why: "Reframes a limitation as a security property."
    tags: ["limitations", "safety", "memory"]
    difficulty: "advanced"

  - id: "ch03-safety-limitations-019"
    type: thinking
    front: "How should you organize documents now to prepare for Knowledge Bases?"
    back: "BECAUSE Knowledge Bases will index and retrieve across folders, THEREFORE meaningful folder structures, consistent naming conventions, and well-organized documents today will make future AI retrieval more effective."
    why: "Connects present action to future capability readiness."
    tags: ["roadmap", "knowledge-bases", "organization"]
    difficulty: "intermediate"

  - id: "ch03-safety-limitations-020"
    type: thinking
    front: "Why does Cowork require a different approach than ChatGPT-style conversations?"
    back: "BECAUSE Cowork has real filesystem access and can modify files, THEREFORE mistakes have permanent consequences — unlike chat errors you can simply ignore or regenerate."
    why: "Distinguishes agentic AI risk from conversational AI risk."
    tags: ["safety", "agentic-ai"]
    difficulty: "advanced"

  - id: "ch03-safety-limitations-021"
    type: thinking
    front: "Why is the project-context.md workaround effective despite being manual?"
    back: "BECAUSE Claude reads files at session start, THEREFORE a structured context file rapidly re-establishes project knowledge without the user needing to retype instructions each time."
    why: "Explains why a simple file solves a complex problem."
    tags: ["limitations", "workaround"]
    difficulty: "intermediate"

  - id: "ch03-safety-limitations-022"
    type: thinking
    front: "How do rate limits on external APIs affect Cowork connector workflows?"
    back: "BECAUSE services like Google, Notion, and Slack impose request limits, THEREFORE large-scale data operations must be planned in batches to avoid hitting rate caps and causing workflow failures."
    why: "Links external constraints to workflow planning."
    tags: ["limitations", "connectors", "rate-limits"]
    difficulty: "intermediate"
