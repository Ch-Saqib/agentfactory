deck:
  id: "ch03-browser-integration-chrome"
  title: "Browser Integration: Claude in Chrome"
  description: "Flashcards covering Claude's Chrome browser integration setup, capabilities, the five-step browser loop, speed considerations, security practices, and when to choose browser automation versus file-based workflows."
  tags: ["browser-automation", "chrome-extension", "cowork", "web-workflows", "security"]
  version: 2

cards:
  - id: "ch03-browser-integration-chrome-001"
    type: recall
    front: "Name any 5 of the 11 capabilities the Claude Chrome extension adds to browser-based workflows?"
    back: "Read page, navigate pages, extract data, fill forms, email cleanup, schedule tasks, record steps, multi-tab batch, planning mode, smart nav for popular apps, slash command shortcuts"
    tags: ["browser-capabilities"]
    difficulty: "intermediate"

  - id: "ch03-browser-integration-chrome-002"
    type: recall
    front: "What role does Claude Desktop play when the Chrome extension is active?"
    back: "Claude Desktop does the reasoning while the extension executes browser actions."
    tags: ["architecture", "remote-control"]
    difficulty: "basic"

  - id: "ch03-browser-integration-chrome-003"
    type: recall
    front: "What are the five steps in Claude's browser automation loop?"
    back: "Page Analysis\nContext Understanding\nAction Planning\nExecution\nVerification"
    tags: ["browser-loop"]
    difficulty: "basic"

  - id: "ch03-browser-integration-chrome-004"
    type: recall
    front: "What four permissions does the Claude Chrome extension require from the browser?"
    back: "Read website content\nNavigate tabs\nFill forms\nClick elements"
    tags: ["permissions", "setup"]
    difficulty: "basic"

  - id: "ch03-browser-integration-chrome-005"
    type: recall
    front: "How fast is a browser page load compared to a filesystem read operation?"
    back: "Page loads take 1-5 seconds versus milliseconds for filesystem reads."
    tags: ["speed", "performance"]
    difficulty: "basic"

  - id: "ch03-browser-integration-chrome-006"
    type: recall
    front: "What five security principles does the lesson recommend for browser integration?"
    back: "Selective activation\nReview actions before execution\nAvoid sensitive data fields\nDeactivate when done\nEnterprise allowlists and blocklists"
    tags: ["security"]
    difficulty: "intermediate"

  - id: "ch03-browser-integration-chrome-007"
    type: recall
    front: "What three types of web content can block or disrupt Claude's browser automation?"
    back: "Dynamically loaded JavaScript content\nMulti-factor authentication flows\nCAPTCHA and bot detection systems"
    tags: ["limitations"]
    difficulty: "intermediate"

  - id: "ch03-browser-integration-chrome-008"
    type: recall
    front: "When should you choose file-based Cowork workflows instead of browser integration?"
    back: "When data is local, no web interaction needed, or high-volume processing required."
    tags: ["tool-selection"]
    difficulty: "intermediate"

  - id: "ch03-browser-integration-chrome-009"
    type: thinking
    front: "Why does the Chrome extension require a connection to Claude Desktop to function?"
    back: "The extension only executes browser actions and has no reasoning capability. Therefore it relays page content to Claude Desktop for analysis and receives instructions back — reasoning lives in Desktop, execution lives in the extension."
    tags: ["architecture", "remote-control"]
    difficulty: "intermediate"
    why: "What would happen if the extension tried to reason independently?"

  - id: "ch03-browser-integration-chrome-010"
    type: thinking
    front: "Why is browser automation fundamentally slower than file-based operations?"
    back: "Browser automation must wait for pages to load, JavaScript to execute, and the DOM to render. Each step takes seconds versus milliseconds for direct filesystem access — the overhead is inherent to web technology, not Claude's speed."
    tags: ["speed", "performance"]
    difficulty: "intermediate"
    why: "What underlying web technologies cause this speed difference?"

  - id: "ch03-browser-integration-chrome-011"
    type: thinking
    front: "Why should you activate the Claude extension only on selected sites?"
    back: "The extension grants Claude significant access to page content and interactive elements. Limiting activation to specific sites reduces the risk of accidental interactions with sensitive data like banking credentials or password managers."
    tags: ["security", "selective-activation"]
    difficulty: "intermediate"
    why: "What risks arise from leaving the extension active everywhere?"

  - id: "ch03-browser-integration-chrome-012"
    type: thinking
    front: "Why can Claude not complete multi-factor authentication flows automatically?"
    back: "MFA requires out-of-band verification through a separate device or channel that Claude cannot access. Therefore the user must manually complete authentication steps before automation can continue."
    tags: ["limitations", "authentication"]
    difficulty: "intermediate"
    why: "What security principle makes automated MFA completion impossible?"

  - id: "ch03-browser-integration-chrome-013"
    type: thinking
    front: "How does the five-step browser loop relate to the propose-approve-execute pattern?"
    back: "Both follow the same structure: analyze context, plan actions, execute with oversight, verify results. The browser loop is a web-specific implementation of the general Cowork collaboration pattern — same principle, different surface."
    tags: ["browser-loop", "cowork-pattern"]
    difficulty: "advanced"
    why: "What shared principle underlies both patterns?"

  - id: "ch03-browser-integration-chrome-014"
    type: thinking
    front: "Why should you prefer local file operations when data is already downloaded?"
    back: "Filesystem reads take milliseconds while browser automation adds seconds of overhead per operation. Using file-based workflows for local data avoids unnecessary slowness and eliminates failure points from page rendering and DOM parsing."
    tags: ["tool-selection", "performance"]
    difficulty: "intermediate"
    why: "What happens to total task time when you use browser automation for local data?"

  - id: "ch03-browser-integration-chrome-015"
    type: thinking
    front: "How would a website layout change break an existing browser automation workflow?"
    back: "Claude identifies elements by their DOM structure and page position. A site redesign invalidates previously reliable element selectors, requiring workflow updates to match the new layout — making browser automation more fragile than file-based alternatives."
    tags: ["limitations", "fragility"]
    difficulty: "advanced"
    why: "What makes browser automation more fragile than file-based workflows?"

  - id: "ch03-browser-integration-chrome-016"
    type: thinking
    front: "Why does the email cleanup workflow still require user confirmation for bulk actions?"
    back: "Bulk deletion and unsubscription are irreversible high-impact actions. The confirmation requirement ensures the user maintains control and can catch errors before permanent changes are made — matching the propose-approve-execute principle."
    tags: ["security", "user-control", "email-workflow"]
    difficulty: "advanced"
    why: "What principle of human-AI collaboration does this reflect?"

  - id: "ch03-browser-integration-chrome-017"
    type: recall
    front: "Which Claude models are available for browser automation on Pro versus Max or Team Premium accounts?"
    back: "Pro: Haiku 4.5 only.\nMax/Team Premium/Enterprise: Haiku 4.5, Sonnet 4.5, or Opus 4.5."
    tags: ["model-availability", "setup"]
    difficulty: "basic"

  - id: "ch03-browser-integration-chrome-018"
    type: recall
    front: "What is the relationship between the Chrome extension and Claude Desktop — does Desktop require the extension?"
    back: "The extension is optional. Claude Desktop works fully without it; the extension adds browser automation on top."
    tags: ["setup", "architecture"]
    difficulty: "basic"

  - id: "ch03-browser-integration-chrome-019"
    type: recall
    front: "What is planning mode in Claude's browser integration?"
    back: "Approve a multi-step plan upfront, then Claude executes uninterrupted."
    tags: ["browser-capabilities", "planning-mode"]
    difficulty: "intermediate"

  - id: "ch03-browser-integration-chrome-020"
    type: thinking
    front: "A team administrator wants to prevent the Claude extension from accessing internal HR portals. What mechanism enables this?"
    back: "Enterprise and Team admins can configure allowlists and blocklists for the extension, controlling which websites it can access across the organization — no individual user configuration required."
    tags: ["security", "enterprise-controls"]
    difficulty: "intermediate"
    why: "Why is centralized control important for enterprise browser automation?"

  - id: "ch03-browser-integration-chrome-021"
    type: thinking
    front: "How does planning mode change the human oversight model for browser automation?"
    back: "Standard automation requires approval action-by-action. Planning mode front-loads oversight — the user approves the full plan once, then Claude executes uninterrupted. This trades granular control for efficiency on well-understood tasks."
    tags: ["planning-mode", "user-control"]
    difficulty: "advanced"
    why: "When would you choose action-by-action approval over planning mode?"

  - id: "ch03-browser-integration-chrome-022"
    type: recall
    front: "What were the results of the email cleanup workflow example in the lesson?"
    back: "Inbox reduced from 2,143 to 347 messages; 12 newsletter unsubscriptions completed."
    tags: ["email-workflow", "results"]
    difficulty: "basic"
