deck:
  id: "ch01-2025-inflection-point"
  title: "The 2025 Inflection Point and The Agent Maturity Model"
  description: "Convergent evidence for the 2025 AI transformation and the Incubator-to-Specialist maturity model that structures AI-native development."
  tags: ["inflection-point", "agent-maturity-model", "general-agents", "custom-agents"]
  version: 1

cards:
  - id: "ch01-2025-inflection-point-001"
    type: recall
    front: "In the 2025 inflection point, what three independent trends converged simultaneously?"
    back: "1. AI capability reached production quality\n2. Mainstream adoption passed the tipping point\n3. Enterprises bet billions on AI-native architecture"
    tags: ["inflection-point", "convergent-evidence"]
    difficulty: "basic"

  - id: "ch01-2025-inflection-point-002"
    type: thinking
    front: "Why is convergent validation from independent sources stronger than evidence from a single source?"
    back: "BECAUSE independent sources (academia, surveys, startups, corporations) have different incentives and methodologies, THEREFORE when they all reach the same conclusion, bias from any single source is eliminated as an explanation."
    tags: ["convergent-evidence", "critical-thinking"]
    difficulty: "intermediate"
    why: "How would you evaluate a technology claim that comes from only one category of source?"

  - id: "ch01-2025-inflection-point-003"
    type: recall
    front: "At the 2025 ICPC World Finals, what unprecedented result did the OpenAI ensemble achieve?"
    back: "A perfect score — solving all 12 problems correctly within the 5-hour time limit, surpassing the winning human team (11 of 12)."
    tags: ["icpc", "capability-breakthroughs"]
    difficulty: "basic"

  - id: "ch01-2025-inflection-point-004"
    type: thinking
    front: "Why does software self-disruption move faster and more completely than external disruption of other industries?"
    back: "BECAUSE the tools that build software are themselves software, THEREFORE development tools, workflows, and mental models all shift simultaneously — unlike external disruption where affected workers can adapt gradually."
    tags: ["self-disruption", "paradigm-shift"]
    difficulty: "intermediate"
    why: "What happens to developers who treat AI tools as optional add-ons rather than fundamental workflow changes?"

  - id: "ch01-2025-inflection-point-005"
    type: recall
    front: "How is the $3 trillion developer economy calculated?"
    back: "30 million professional developers globally × $100,000 average annual economic value (salary, benefits, productivity multipliers) = $3 trillion."
    tags: ["developer-economy", "market-size"]
    difficulty: "basic"

  - id: "ch01-2025-inflection-point-006"
    type: thinking
    front: "Why do General Agents build Custom Agents rather than competing with them?"
    back: "BECAUSE General Agents explore requirements and prototype solutions during incubation, THEREFORE once patterns stabilize, that crystallized understanding becomes the specification for a Custom Agent optimized for reliability and scale."
    tags: ["agent-maturity-model", "general-agents", "custom-agents"]
    difficulty: "intermediate"
    why: "What would go wrong if you tried to build a Custom Agent without any incubation phase?"

  - id: "ch01-2025-inflection-point-007"
    type: recall
    front: "What are the two stages of the Agent Maturity Model?"
    back: "1. Incubation (General Agents) — explore and prototype\n2. Specialization (Custom Agents) — execute at scale with reliability"
    tags: ["agent-maturity-model"]
    difficulty: "basic"

  - id: "ch01-2025-inflection-point-008"
    type: thinking
    front: "Why does premature specialization — building a Custom Agent before requirements stabilize — lead to failure?"
    back: "BECAUSE without incubation you haven't discovered true requirements, edge cases, or architecture decisions, THEREFORE you over-engineer a solution to the wrong problem and ship a brittle system that must be rebuilt."
    tags: ["anti-patterns", "premature-specialization"]
    difficulty: "intermediate"
    why: "How would you recognize that you're prematurely specializing in a real project?"

  - id: "ch01-2025-inflection-point-009"
    type: recall
    front: "In the Agent Maturity Model, what are the Director's four responsibilities when working with General Agents?"
    back: "1. Set the Intent (describe the goal)\n2. Provide Access (give the agent your codebase context)\n3. Review the Work (evaluate what the agent builds)\n4. Course Correct (provide feedback for adaptation)"
    tags: ["director-role", "general-agents"]
    difficulty: "basic"

  - id: "ch01-2025-inflection-point-010"
    type: thinking
    front: "How does dynamic planning in General Agents differ from the old approach of micromanaging AI?"
    back: "BECAUSE dynamic planning lets you provide just a goal while the agent decomposes and adapts subtasks on the fly, THEREFORE your focus shifts from syntax and step-by-step instructions to features and user experience."
    tags: ["dynamic-planning", "general-agents"]
    difficulty: "intermediate"
    why: "Why does dynamic planning require stronger specification skills from the developer than micromanaging does?"

  - id: "ch01-2025-inflection-point-011"
    type: recall
    front: "In the Agent Maturity Model, what is a General Agent optimized for versus a Custom Agent?"
    back: "General Agent: optimized for flexibility and exploration.\nCustom Agent: optimized for reliability and efficiency."
    tags: ["agent-maturity-model", "optimization"]
    difficulty: "basic"

  - id: "ch01-2025-inflection-point-012"
    type: thinking
    front: "Why do Custom Agents (Specialists) exist when General Agents are more powerful and flexible?"
    back: "BECAUSE General Agents have costs that don't scale — slower speed, higher cost per request, variable reliability, and harder governance — THEREFORE Custom Agents exist to execute predefined workflows with consistency, speed, and built-in guardrails at volume."
    tags: ["custom-agents", "production", "scaling"]
    difficulty: "intermediate"
    why: "What production metrics would signal it's time to evolve from a General Agent to a Custom Agent?"

  - id: "ch01-2025-inflection-point-013"
    type: recall
    front: "According to the Stack Overflow 2025 Developer Survey, what percentage of professional developers use or plan to use AI coding tools?"
    back: "84%, with 51% reporting daily use."
    tags: ["adoption", "stack-overflow"]
    difficulty: "basic"

  - id: "ch01-2025-inflection-point-014"
    type: thinking
    front: "How does context-aware reasoning in modern General Agents differ from the old way of working with AI?"
    back: "BECAUSE modern agents scan your entire repository and observe your tech stack and patterns autonomously, THEREFORE you no longer manually paste files and spoon-feed context — the agent reasons about your specific codebase without you explaining it."
    tags: ["context-awareness", "general-agents"]
    difficulty: "intermediate"
    why: "Why does repository-level context make specification writing more important, not less?"

  - id: "ch01-2025-inflection-point-015"
    type: recall
    front: "According to the DORA 2025 Report, what is the median daily AI tool usage among development professionals?"
    back: "2 hours per day — roughly one-quarter of the workday."
    tags: ["adoption", "dora-report"]
    difficulty: "intermediate"

  - id: "ch01-2025-inflection-point-016"
    type: thinking
    front: "Why is the output of successful incubation described as 'crystallized understanding' rather than just 'working code'?"
    back: "BECAUSE incubation reveals discovered requirements, proven patterns, edge cases, and validated architecture decisions beyond just working code, THEREFORE this crystallized understanding becomes the specification — the 'genetic material' — for building the Custom Agent."
    tags: ["incubation", "crystallization"]
    difficulty: "advanced"
    why: "How would the quality of a Custom Agent differ if built from crystallized understanding versus from an initial requirements document?"

  - id: "ch01-2025-inflection-point-017"
    type: recall
    front: "What are the three anti-patterns in the Agent Maturity Model?"
    back: "1. Premature Specialization — building Custom Agents before requirements stabilize\n2. Perpetual Incubation — using General Agents for production workloads indefinitely\n3. Skipping Incubation — specifying Custom Agents without exploration first"
    tags: ["anti-patterns", "agent-maturity-model"]
    difficulty: "intermediate"

  - id: "ch01-2025-inflection-point-018"
    type: thinking
    front: "Why do technology transition opportunity windows typically close within 3-5 years?"
    back: "BECAUSE early adopters shape best practices, build compounding expertise, and define conventions, THEREFORE by year 3-5 practices have settled and late arrivals must learn someone else's conventions while competing against years of built intuition."
    tags: ["opportunity-window", "career-strategy"]
    difficulty: "intermediate"
    why: "How does contributing to shaping a methodology differ from learning an established one?"

  - id: "ch01-2025-inflection-point-019"
    type: recall
    front: "In the Agent Maturity Model, what are the Builder's four responsibilities when creating Custom Agents?"
    back: "1. Define Purpose Precisely (scope, constraints, success criteria)\n2. Build Guardrails (hard safety limits, not suggestions)\n3. Create Specialized Components (optimized prompts, tools, workflows)\n4. Deploy as Product (monitoring, logging, operational excellence)"
    tags: ["builder-role", "custom-agents"]
    difficulty: "basic"

  - id: "ch01-2025-inflection-point-020"
    type: thinking
    front: "Why does the Agent Factory feedback loop — where production data feeds back into the Incubator — create a compounding advantage?"
    back: "BECAUSE each deployed Specialist generates real usage data revealing gaps, requirements, and failure patterns that feed back to the Incubator, THEREFORE each cycle produces better agents faster — creating a flywheel where operational experience accelerates development."
    tags: ["agent-factory", "feedback-loop"]
    difficulty: "advanced"
    why: "What breaks if a company deploys Custom Agents but never feeds production data back to their General Agent workflow?"
