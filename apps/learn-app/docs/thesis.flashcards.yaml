deck:
  id: "thesis"
  title: "The Agent Factory Thesis"
  description: "Core concepts of the Agent Factory thesis — the paradigm shift from SaaS tools to manufactured AI employees that deliver outcomes at scale."
  tags: ["thesis", "agent-factory", "paradigm-shift", "part-0"]
  version: 2

cards:
  - id: "thesis-001"
    front: "A startup pitches investors: 'We don't sell software licenses. Clients define what they need, and our system delivers verified results.' Which era does this represent, and what is its value metric?"
    back: "Agent Factory era.\nValue metric: per-outcome results (not per-seat subscriptions)."
    tags: ["paradigm-shift", "application"]
    difficulty: "intermediate"
    why: "Why does per-outcome pricing align incentives better than per-seat for the buyer?"

  - id: "thesis-002"
    front: "In the SaaS era, humans are operators. What role do humans play in the Agent Factory era?"
    back: "Supervisor and verifier.\nThey define intent, oversee agent execution, and confirm correctness."
    tags: ["human-in-the-loop", "comparison"]
    difficulty: "basic"

  - id: "thesis-003"
    front: "A company's agents access a CRM, calendar, and email through one standard protocol instead of three custom integrations. What mechanism enables this?"
    back: "MCP (Model Context Protocol).\nA shared tool-connection standard replacing rigid point-to-point APIs."
    tags: ["mcp", "application"]
    difficulty: "intermediate"
    why: "How does a universal protocol reduce the cost of adding new tools to an agent's capabilities?"

  - id: "thesis-004"
    front: "Name the three layers of the Industrialized Stack in order."
    back: "1. Intent — goals, constraints, budgets, permissions\n2. The Factory — agents that transform intent into results\n3. Outcome — verified artifacts delivered on demand"
    tags: ["architecture", "enumeration"]
    difficulty: "basic"

  - id: "thesis-005"
    front: "A product manager writes: 'Monitor competitor pricing, alert on changes > 5%, suggest responses within our margin constraints.' Which Industrialized Stack layer is this?"
    back: "Intent.\nIt captures goals (monitor, alert, suggest), constraints (> 5% threshold, margin limits), and permissions — the high-level blueprint."
    tags: ["architecture", "application"]
    difficulty: "intermediate"
    why: "Why must Intent remain separate from the Factory layer that executes it?"

  - id: "thesis-006"
    front: "Three mechanisms power The Factory. What does each one do?"
    back: "Specs — define what work must be done\nSkills — package how the work gets done\nFeedback loops — ensure continuous improvement"
    tags: ["factory", "enumeration"]
    difficulty: "intermediate"

  - id: "thesis-007"
    front: "A legal agent's contract templates and clause logic are packaged for reuse across different clients. Which factory mechanism is this?"
    back: "Skills.\nSkills package reusable capabilities — the 'how' that agents deploy across different contexts."
    tags: ["factory", "application"]
    difficulty: "intermediate"
    why: "What happens to agent quality if skills are not separated from individual specs?"

  - id: "thesis-008"
    front: "An agent consistently misformats dates in reports. The team updates formatting rules and the agent improves. Which factory mechanism is at work?"
    back: "Feedback loops.\nThe cycle of identifying errors, updating rules, and measuring improvement is exactly what feedback loops accomplish."
    tags: ["factory", "application"]
    difficulty: "intermediate"

  - id: "thesis-009"
    front: "The thesis uses an industrial plant analogy. Map the three elements: raw material, specialized stations, finished product."
    back: "Raw material = Intent\nSpecialized stations = Agents\nFinished product = Verified outcome"
    tags: ["factory", "comparison"]
    difficulty: "basic"

  - id: "thesis-010"
    front: "The Factory is described as 'not a single piece of software.' What is it?"
    back: "An architecture — a set of principles for building systems where agents are manufactured, composed, and deployed."
    tags: ["factory", "definition"]
    difficulty: "basic"

  - id: "thesis-011"
    front: "The thesis claims AI paired with a human outperforms either alone. What does this imply about fully autonomous AI systems?"
    back: "Fully autonomous systems are suboptimal for most tasks.\nThe human-in-the-loop is a design feature, not a temporary limitation."
    tags: ["human-in-the-loop", "causation"]
    difficulty: "advanced"
    why: "Under what conditions might fully autonomous agents become the better choice despite this general finding?"

  - id: "thesis-012"
    front: "A senior React developer enters the Agent Factory era. What changes about how they spend their expertise?"
    back: "They stop hand-coding screens and start designing, deploying, and supervising agents that deliver entire products.\nTheir systems knowledge becomes more valuable, not less."
    tags: ["human-in-the-loop", "application"]
    difficulty: "intermediate"
    why: "Why does understanding systems, data flows, and APIs matter more when agents do the implementation?"

  - id: "thesis-013"
    front: "The thesis says AI will 'unbundle jobs into tasks.' Why does unbundling create opportunity rather than just displacement?"
    back: "Unbundling creates new combinations — new roles, businesses, and markets that didn't exist when work was locked inside rigid job titles."
    tags: ["workforce", "causation"]
    difficulty: "advanced"
    why: "Can you name a historical example of job unbundling that created more roles than it eliminated?"

  - id: "thesis-014"
    front: "What must the future workforce build instead of relying on fixed career paths?"
    back: "Dynamic skill portfolios.\nProfessionals who think with AI, build using AI tools daily, and collaborate with AI as a teammate will thrive."
    tags: ["workforce", "definition"]
    difficulty: "basic"

  - id: "thesis-015"
    front: "Name four new roles the thesis predicts the Agent Factory era will create."
    back: "1. Agent designers\n2. Outcome architects\n3. Verification specialists\n4. Domain experts who teach machines what 'correct' looks like"
    tags: ["workforce", "enumeration"]
    difficulty: "intermediate"

  - id: "thesis-016"
    front: "A data analyst spends 80% of their time cleaning spreadsheets. How does the Agent Factory era change their work?"
    back: "They supervise agents that clean data and focus on verifying insights and designing analyses — promoted from operator to supervisor."
    tags: ["human-in-the-loop", "application"]
    difficulty: "intermediate"
    why: "What new skills must this analyst develop to effectively supervise data-cleaning agents?"

  - id: "thesis-017"
    front: "What is the difference between an AI tool and an AI employee?"
    back: "AI tool: performs a single requested task.\nAI employee: operates autonomously within a role, composing tools and spawning agents to deliver complete outcomes."
    tags: ["core-concept", "comparison"]
    difficulty: "basic"

  - id: "thesis-018"
    front: "The thesis lists four elements that industrialize execution. Name them."
    back: "1. Machine-readable specs\n2. Reusable skills\n3. Standard Tool Protocols (MCP)\n4. Cloud-native infrastructure"
    tags: ["paradigm-shift", "enumeration"]
    difficulty: "intermediate"
    why: "Why is cloud-native infrastructure specifically required rather than on-premise systems?"

  - id: "thesis-019"
    front: "'Capability on demand' replaces manual workflows. What does this phrase mean concretely?"
    back: "Agent-delivered capabilities activate instantly when requested — no manual workflow setup, no waiting for human operators to perform each step."
    tags: ["paradigm-shift", "definition"]
    difficulty: "basic"

  - id: "thesis-020"
    front: "Winners in the Agent Factory era are measured by what two criteria?"
    back: "1. Outcomes guaranteed\n2. Problems they solve\n(Not by seats sold or lines of code written.)"
    tags: ["paradigm-shift", "reversal"]
    difficulty: "basic"

  - id: "thesis-021"
    front: "A verified sales analysis, a formatted legal contract, and an optimized ad campaign — delivered on demand with accuracy guarantees. Which Industrialized Stack layer are these?"
    back: "Outcome.\nHigh-fidelity actions and artifacts — delivered on demand, verified for accuracy, continuously improved through feedback loops."
    tags: ["architecture", "application"]
    difficulty: "intermediate"
    why: "What makes an outcome 'verified' versus just 'generated'?"

  - id: "thesis-022"
    front: "The SaaS era created millions of jobs for developers, designers, and PMs. What does the thesis predict for the Agent Factory era?"
    back: "It will create millions more — in new roles like agent designers, outcome architects, and verification specialists.\nThe opportunity is broader, not smaller."
    tags: ["workforce", "comparison"]
    difficulty: "intermediate"

  - id: "thesis-023"
    front: "Specs define what, skills define how, feedback loops ensure improvement. If you removed feedback loops, what degrades?"
    back: "The system stops improving. Errors repeat indefinitely, skills become stale, and outcome quality plateaus or declines over time."
    tags: ["factory", "causation"]
    difficulty: "advanced"
    why: "How do feedback loops interact with skills to prevent quality degradation?"

  - id: "thesis-024"
    front: "The thesis describes the human transition as: operator → _____, typist → _____, coder → _____."
    back: "Operator → Supervisor\nTypist → Editor\nCoder → Architect of outcomes"
    tags: ["human-in-the-loop", "reversal"]
    difficulty: "basic"
    why: "What is the common pattern across all three transitions?"

  - id: "thesis-025"
    front: "A marketing professional wants to stay relevant. What three behaviors does the thesis recommend?"
    back: "1. Learn to think with AI\n2. Build using AI tools daily\n3. Collaborate with AI as a digital teammate"
    tags: ["workforce", "application"]
    difficulty: "advanced"
    why: "Why does daily practice with AI tools matter more than theoretical knowledge about AI?"
