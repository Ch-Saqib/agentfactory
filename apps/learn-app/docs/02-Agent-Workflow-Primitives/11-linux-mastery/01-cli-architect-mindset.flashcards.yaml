deck:
  id: "ch11-01-cli-architect-mindset"
  title: "The CLI Architect Mindset"
  description: "Terminal vs shell, Linux filesystem hierarchy, navigation commands, and absolute vs relative paths for AI agent deployment."
  tags: ["linux", "cli", "terminal", "filesystem", "navigation", "agent-deployment"]
  version: 1

cards:
  - id: "ch11-01-cli-architect-mindset-001"
    front: "What is the difference between a terminal and a shell?"
    back: "Terminal = the window application (handles input/output).\nShell = the command interpreter running inside it (reads and executes commands)."
    tags: ["terminal", "shell"]
    difficulty: "basic"

  - id: "ch11-01-cli-architect-mindset-002"
    front: "Why does knowing which shell is running matter when debugging agent startup scripts?"
    back: "BECAUSE different shells have different features and syntax, a script that works under one shell may fail under another. THEREFORE checking `echo $SHELL` is a critical first diagnostic step."
    tags: ["shell", "debugging"]
    difficulty: "intermediate"
    why: "Connects the terminal/shell distinction to real deployment failures"

  - id: "ch11-01-cli-architect-mindset-003"
    front: "How does the Linux filesystem differ from Windows in its top-level organization?"
    back: "Linux uses a single unified tree from one root `/`.\nWindows uses separate drive letters (C:\\, D:\\)."
    tags: ["filesystem", "linux"]
    difficulty: "basic"

  - id: "ch11-01-cli-architect-mindset-004"
    front: "Why does Linux separate configuration, logs, and programs into different directories instead of grouping by application?"
    back: "BECAUSE dozens of services run simultaneously, separating by function (/etc for config, /var for logs, /usr for programs) keeps the system organized. THEREFORE you always know where to look regardless of which application you are troubleshooting."
    tags: ["filesystem", "architecture"]
    difficulty: "advanced"
    why: "Tests understanding of the design philosophy behind the filesystem hierarchy"

  - id: "ch11-01-cli-architect-mindset-005"
    front: "What does the `pwd` command do?"
    back: "Prints the current working directory — your exact location in the filesystem tree."
    tags: ["commands", "navigation"]
    difficulty: "basic"

  - id: "ch11-01-cli-architect-mindset-006"
    front: "What does `ls -la` reveal that `ls` alone does not?"
    back: "Hidden files (names starting with `.`) and long format details (permissions, owner, size, modification date)."
    tags: ["commands", "ls"]
    difficulty: "basic"

  - id: "ch11-01-cli-architect-mindset-007"
    front: "Why do agent deployment scripts use absolute paths instead of relative paths?"
    back: "BECAUSE scripts may be called from any directory, absolute paths always resolve to the same location. THEREFORE they prevent 'where am I?' errors that relative paths would cause in automated contexts."
    tags: ["paths", "deployment"]
    difficulty: "intermediate"
    why: "Links path choice to real production reliability"

  - id: "ch11-01-cli-architect-mindset-008"
    front: "What do `.` and `..` represent in a Linux directory listing?"
    back: "`.` = the current directory.\n`..` = the parent directory (one level up)."
    tags: ["filesystem", "navigation"]
    difficulty: "basic"

  - id: "ch11-01-cli-architect-mindset-009"
    front: "Why are CLI skills essential for managing AI agents in production?"
    back: "BECAUSE most production agents run on headless Linux servers with no GUI, the command line is the only operational interface available. THEREFORE CLI mastery determines whether you recover a downed agent in minutes or hours."
    tags: ["cli", "agent-deployment"]
    difficulty: "intermediate"
    why: "Connects CLI fluency to real-world incident response speed"

  - id: "ch11-01-cli-architect-mindset-010"
    front: "What does 'headless' mean in the context of a Linux server?"
    back: "A server without monitor, keyboard, or graphical desktop — accessible only through the network and command line."
    tags: ["servers", "headless"]
    difficulty: "basic"

  - id: "ch11-01-cli-architect-mindset-011"
    front: "If you are in `/usr/bin` and run `cd ../home`, where do you end up and why?"
    back: "BECAUSE `..` moves up one level from `/usr/bin` to `/usr`, then `../home` moves up again to `/` and down into `/home`. THEREFORE you end up at `/home`."
    tags: ["paths", "navigation"]
    difficulty: "intermediate"
    why: "Tests ability to trace relative path traversal across multiple levels"

  - id: "ch11-01-cli-architect-mindset-012"
    front: "Which command checks the default shell on a Linux system?"
    back: "`echo $SHELL` — outputs the path to the default shell (e.g., /bin/bash)."
    tags: ["commands", "shell"]
    difficulty: "basic"

  - id: "ch11-01-cli-architect-mindset-013"
    front: "What are the five key Linux directories for agent work and their purposes?"
    back: "/home — user files and development\n/etc — system and app configuration\n/var — logs and runtime data\n/usr — installed programs and utilities\n/ — root, the starting point of everything"
    tags: ["filesystem", "directories"]
    difficulty: "intermediate"

  - id: "ch11-01-cli-architect-mindset-014"
    front: "Why should you always run `pwd` before commands that create, move, or delete files?"
    back: "BECAUSE destructive commands act on the current directory by default, running `pwd` first confirms you are in the intended location. THEREFORE it prevents accidentally modifying files in the wrong directory."
    tags: ["safety", "navigation"]
    difficulty: "advanced"
    why: "Reinforces the habit of verifying location before any state-changing operation"
