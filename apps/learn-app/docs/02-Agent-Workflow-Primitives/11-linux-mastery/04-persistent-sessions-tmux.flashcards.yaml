deck:
  id: "ch11-04-persistent-sessions-tmux"
  title: "Persistent Sessions with tmux"
  description: "Master tmux session lifecycle, pane splitting, window management, copy mode, named sessions, and session scripts for persistent terminal workflows."
  tags: ["tmux", "terminal-multiplexer", "persistent-sessions", "pane-splitting", "session-scripts", "linux"]
  version: 1

cards:
  - id: "ch11-04-persistent-sessions-tmux-001"
    front: "What are the four operations in the tmux session lifecycle?"
    back: "Create, detach, attach, kill"
    tags: ["tmux", "session-lifecycle"]
    difficulty: "basic"

  - id: "ch11-04-persistent-sessions-tmux-002"
    front: "What command creates a new tmux session named 'agent-training'?"
    back: "tmux new-session -s agent-training"
    tags: ["tmux", "session-lifecycle"]
    difficulty: "basic"

  - id: "ch11-04-persistent-sessions-tmux-003"
    front: "What key sequence detaches from a tmux session?"
    back: "Ctrl+b, then d"
    tags: ["tmux", "session-lifecycle"]
    difficulty: "basic"

  - id: "ch11-04-persistent-sessions-tmux-004"
    front: "What command reattaches to a tmux session named 'work'?"
    back: "tmux attach -t work"
    tags: ["tmux", "session-lifecycle"]
    difficulty: "basic"

  - id: "ch11-04-persistent-sessions-tmux-005"
    front: "What command lists all active tmux sessions?"
    back: "tmux ls — lists all active sessions."
    tags: ["tmux", "session-lifecycle"]
    difficulty: "basic"

  - id: "ch11-04-persistent-sessions-tmux-006"
    front: "What command permanently destroys a tmux session named 'debug'?"
    back: "tmux kill-session -t debug"
    tags: ["tmux", "session-lifecycle"]
    difficulty: "basic"

  - id: "ch11-04-persistent-sessions-tmux-007"
    front: "Why do processes inside a tmux session survive an SSH disconnection?"
    back: "BECAUSE tmux sessions run on the server independently of your SSH connection, THEREFORE the OS has no reason to kill them when the connection drops."
    tags: ["tmux", "persistence"]
    difficulty: "intermediate"
    why: "Connects session persistence to how the OS manages process ownership"

  - id: "ch11-04-persistent-sessions-tmux-008"
    front: "What key sequence splits a tmux pane vertically into left and right?"
    back: "Ctrl+b, then %"
    tags: ["tmux", "pane-splitting"]
    difficulty: "basic"

  - id: "ch11-04-persistent-sessions-tmux-009"
    front: "What key sequence splits a tmux pane horizontally into top and bottom?"
    back: "Ctrl+b, then \""
    tags: ["tmux", "pane-splitting"]
    difficulty: "basic"

  - id: "ch11-04-persistent-sessions-tmux-010"
    front: "Why does tmux offer both cycling and directional pane navigation?"
    back: "BECAUSE cycling (Ctrl+b, o) is fast for two panes, but with many panes directional arrows (Ctrl+b, arrow) let you jump precisely, THEREFORE each method suits different layout complexity."
    tags: ["tmux", "pane-splitting"]
    difficulty: "intermediate"
    why: "Explores when to use each navigation method based on pane count"

  - id: "ch11-04-persistent-sessions-tmux-011"
    front: "How would confusing detaching with closing the terminal affect a tmux session?"
    back: "BECAUSE detaching (Ctrl+b, d) preserves the session while closing the terminal may kill it, THEREFORE always explicitly detach to guarantee session persistence."
    tags: ["tmux", "misconceptions"]
    difficulty: "intermediate"
    why: "Tests understanding of why explicit detachment is the reliable habit"

  - id: "ch11-04-persistent-sessions-tmux-012"
    front: "What key sequence creates a new window inside a tmux session?"
    back: "Ctrl+b, then c"
    tags: ["tmux", "window-management"]
    difficulty: "basic"

  - id: "ch11-04-persistent-sessions-tmux-013"
    front: "How do tmux windows differ from tmux panes?"
    back: "Windows are entirely separate screens (like browser tabs), BECAUSE panes divide a single screen while windows provide independent full-screen views within the same session."
    tags: ["tmux", "window-management"]
    difficulty: "intermediate"
    why: "Distinguishes two commonly confused tmux organizational units"

  - id: "ch11-04-persistent-sessions-tmux-014"
    front: "What key sequence enters copy mode in tmux?"
    back: "Ctrl+b, then ["
    tags: ["tmux", "copy-mode"]
    difficulty: "intermediate"

  - id: "ch11-04-persistent-sessions-tmux-015"
    front: "Why does tmux copy mode use / for search, similar to vim?"
    back: "BECAUSE tmux copy mode borrows vi-style keybindings by default, THEREFORE users familiar with vim can search scrollback using / and navigate matches with n/N without learning new shortcuts."
    tags: ["tmux", "copy-mode"]
    difficulty: "intermediate"
    why: "Connects tmux design choices to the broader Unix tool consistency pattern"

  - id: "ch11-04-persistent-sessions-tmux-016"
    front: "Why is copy mode essential for diagnosing agent failures?"
    back: "BECAUSE agent logs scroll past quickly, copy mode lets you scroll back through output history and search for exact error messages that caused a crash."
    tags: ["tmux", "copy-mode"]
    difficulty: "intermediate"
    why: "Connects copy mode to the practical need for post-failure log investigation"

  - id: "ch11-04-persistent-sessions-tmux-017"
    front: "Why is the -d flag useful when creating multiple tmux sessions in sequence?"
    back: "BECAUSE without -d each new-session attaches immediately, blocking you from creating more sessions, THEREFORE -d creates sessions in detached mode so you can batch-create several at once."
    tags: ["tmux", "session-lifecycle"]
    difficulty: "intermediate"
    why: "Explains why detached creation is essential for scripted multi-session setup"

  - id: "ch11-04-persistent-sessions-tmux-018"
    front: "Why should you use named sessions instead of letting tmux assign numbers?"
    back: "BECAUSE numbered sessions (0, 1, 2) become confusing with multiple sessions, THEREFORE named sessions let you identify each project's workspace at a glance."
    tags: ["tmux", "named-sessions"]
    difficulty: "intermediate"
    why: "Explores the organizational cost of default numbering at scale"

  - id: "ch11-04-persistent-sessions-tmux-019"
    front: "What key sequence switches between tmux sessions from inside a session?"
    back: "Ctrl+b, then s\nThen arrow keys to select, Enter to switch"
    tags: ["tmux", "named-sessions"]
    difficulty: "intermediate"

  - id: "ch11-04-persistent-sessions-tmux-020"
    front: "What does tmux list-panes verify?"
    back: "The number, size, and state of panes\nin a session"
    tags: ["tmux", "pane-splitting"]
    difficulty: "intermediate"

  - id: "ch11-04-persistent-sessions-tmux-021"
    front: "Why do session scripts matter for reproducible tmux layouts?"
    back: "BECAUSE manually splitting panes and running commands is tedious and error-prone, THEREFORE a script creates the exact same layout on any server with one command."
    tags: ["tmux", "session-scripts"]
    difficulty: "intermediate"
    why: "Connects automation to the reproducibility principle across servers"

  - id: "ch11-04-persistent-sessions-tmux-022"
    front: "Why does send-keys use a target format like SESSION:WINDOW.PANE?"
    back: "BECAUSE a tmux server can run multiple sessions, each with multiple windows and panes, THEREFORE the hierarchical address SESSION:WINDOW.PANE uniquely identifies exactly which pane receives the command."
    tags: ["tmux", "session-scripts"]
    difficulty: "advanced"
    why: "Reveals the session-window-pane hierarchy that underpins tmux addressing"

  - id: "ch11-04-persistent-sessions-tmux-023"
    front: "How does tmux extend Principle 5 (persisting state in files) from Chapter 6?"
    back: "BECAUSE Principle 5 persists knowledge to disk, tmux extends this by persisting running processes across disconnections, THEREFORE both data and execution survive session loss."
    tags: ["tmux", "persistence", "principles"]
    difficulty: "advanced"
    why: "Links tmux persistence to the broader seven-principles framework"

  - id: "ch11-04-persistent-sessions-tmux-024"
    front: "What happens to tmux sessions when the server reboots?"
    back: "Sessions are lost on reboot unless using\nplugins like tmux-resurrect"
    tags: ["tmux", "misconceptions"]
    difficulty: "intermediate"

  - id: "ch11-04-persistent-sessions-tmux-025"
    front: "Why should you periodically run tmux ls on shared servers?"
    back: "BECAUSE forgotten sessions consume server memory and confuse other administrators, THEREFORE periodic cleanup with tmux ls and kill-session prevents resource waste."
    tags: ["tmux", "safety"]
    difficulty: "advanced"
    why: "Connects session hygiene to shared-server resource management"

  - id: "ch11-04-persistent-sessions-tmux-026"
    front: "What key sequence renames the current tmux window?"
    back: "Ctrl+b, then , (comma)"
    tags: ["tmux", "window-management"]
    difficulty: "basic"

  - id: "ch11-04-persistent-sessions-tmux-027"
    front: "Are tmux panes separate sessions or views within the same session?"
    back: "Panes are views within the same session window, sharing the same session lifecycle -- not separate sessions."
    tags: ["tmux", "misconceptions"]
    difficulty: "intermediate"
    why: "Addresses the common misconception that panes have independent lifecycles"

  - id: "ch11-04-persistent-sessions-tmux-028"
    front: "What two tmux commands represent the minimum viable skill from this lesson?"
    back: "tmux new -s work\ntmux attach -t work"
    tags: ["tmux", "session-lifecycle"]
    difficulty: "basic"

  - id: "ch11-04-persistent-sessions-tmux-029"
    front: "Why does a session script kill the existing session before creating a new one?"
    back: "BECAUSE running the script twice would fail if a session with the same name already exists, THEREFORE killing first ensures a clean start every time."
    tags: ["tmux", "session-scripts"]
    difficulty: "advanced"
    why: "Tests understanding of idempotent script design for session creation"

  - id: "ch11-04-persistent-sessions-tmux-030"
    front: "Why might split-window -h seem counterintuitive for creating a vertical divider?"
    back: "BECAUSE -h means 'horizontal layout' (panes side by side), the divider itself is vertical. THEREFORE the flag describes pane arrangement, not divider orientation, which confuses beginners."
    tags: ["tmux", "pane-splitting", "session-scripts"]
    difficulty: "advanced"
    why: "Addresses a common point of confusion about tmux split naming conventions"
