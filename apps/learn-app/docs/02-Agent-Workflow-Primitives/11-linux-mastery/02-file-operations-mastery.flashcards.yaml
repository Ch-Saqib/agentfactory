deck:
  id: "ch11-02-file-operations-mastery"
  title: "File Operations Mastery"
  description: "Flashcards covering file creation, copying, moving, deletion, reading, and wildcards on Linux — the building blocks for organizing agent workspaces."
  tags: ["linux", "file-operations", "cli", "chapter-11"]
  version: 1

cards:
  - id: "ch11-02-file-operations-mastery-001"
    front: "What does the touch command do when the file already exists?"
    back: "Updates the file's timestamp without changing its content."
    tags: ["touch", "file-creation"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-002"
    front: "What is the file size of a newly created file using touch?"
    back: "0 bytes — touch creates an empty file."
    tags: ["touch", "file-creation"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-003"
    front: "Why does mkdir my-agent/src/handlers fail without the -p flag?"
    back: "BECAUSE mkdir requires parent directories to exist already. Without -p, it cannot create intermediate directories, THEREFORE the missing my-agent/src parent causes the error."
    tags: ["mkdir", "directories"]
    difficulty: "intermediate"
    why: "Tests understanding of how directory creation traverses the path hierarchy."

  - id: "ch11-02-file-operations-mastery-004"
    front: "What two benefits does mkdir -p provide over plain mkdir?"
    back: "Creates all missing parent directories automatically.\nNever errors on already-existing directories."
    tags: ["mkdir", "directories"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-005"
    front: "Why is brace expansion useful when creating agent workspace directories?"
    back: "BECAUSE brace expansion like {src,config,logs,data} automatically generates four separate directory names from one expression, THEREFORE you create an entire workspace structure in a single mkdir -p command instead of four."
    tags: ["brace-expansion", "mkdir"]
    difficulty: "intermediate"
    why: "Connects shell expansion to practical efficiency in workspace setup."

  - id: "ch11-02-file-operations-mastery-006"
    front: "How does cp behave when the destination is a directory versus a filename?"
    back: "BECAUSE cp interprets the destination contextually — a directory means copy the file into it keeping the original name, THEREFORE a filename destination creates a copy with that new name."
    tags: ["cp", "copying"]
    difficulty: "intermediate"
    why: "Distinguishes two modes of cp behavior based on destination type."

  - id: "ch11-02-file-operations-mastery-007"
    front: "What flag is required to copy an entire directory with cp?"
    back: "-r (recursive)."
    tags: ["cp", "copying"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-008"
    front: "Why does cp require the -r flag for directories but mv does not?"
    back: "BECAUSE copying a directory involves duplicating potentially thousands of files, the system requires explicit confirmation via -r. Moving only changes where the name points in the filesystem, THEREFORE no recursion is needed."
    tags: ["cp", "mv", "comparison"]
    difficulty: "advanced"
    why: "Explores the underlying filesystem mechanics that explain the asymmetry."

  - id: "ch11-02-file-operations-mastery-009"
    front: "When does mv rename a file versus move it?"
    back: "Same directory = rename.\nDifferent directory = move.\nBoth at once is also possible."
    tags: ["mv", "renaming"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-010"
    front: "What happens to the original file after cp versus after mv?"
    back: "cp: original stays (creates a duplicate).\nmv: original is gone (relocates it)."
    tags: ["cp", "mv", "comparison"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-011"
    front: "Why is there no recycle bin or undo for rm on Linux?"
    back: "BECAUSE Linux rm directly removes the file's directory entry and frees the disk blocks, there is no intermediate trash location, THEREFORE deletion is immediate and permanent."
    tags: ["rm", "deletion", "safety"]
    difficulty: "intermediate"
    why: "Connects Linux filesystem design to the permanence of deletion."

  - id: "ch11-02-file-operations-mastery-012"
    front: "What does the -i flag do when used with rm?"
    back: "Prompts for confirmation before each file deletion."
    tags: ["rm", "safety"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-013"
    front: "Why does the safe deletion pattern start with ls before rm -i before rm -rf?"
    back: "BECAUSE each step increases confidence — ls shows what exists, rm -i confirms each file individually, THEREFORE by the time you run rm -rf you have already verified the target twice and speed is safe."
    tags: ["rm", "safety", "best-practices"]
    difficulty: "intermediate"
    why: "Explains the escalating-confidence logic behind the three-step pattern."

  - id: "ch11-02-file-operations-mastery-014"
    front: "Why is rm -rf especially dangerous compared to rm -r?"
    back: "BECAUSE the -f (force) flag suppresses all confirmation prompts, rm -rf deletes recursively and silently, THEREFORE a wrong path destroys files instantly with no chance to catch the mistake."
    tags: ["rm", "safety"]
    difficulty: "intermediate"
    why: "Highlights how one flag changes deletion from cautious to catastrophic."

  - id: "ch11-02-file-operations-mastery-015"
    front: "What command is ideal for reading short files under 50 lines?"
    back: "cat — dumps entire file to terminal."
    tags: ["cat", "reading"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-016"
    front: "How many lines does head display by default?"
    back: "10 lines from the start of the file."
    tags: ["head", "reading"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-017"
    front: "Why is tail typically the first command when debugging an agent?"
    back: "BECAUSE log files append new entries at the bottom, tail shows the most recent lines first, THEREFORE it immediately surfaces what happened last — which is usually where the bug is."
    tags: ["tail", "debugging"]
    difficulty: "intermediate"
    why: "Connects log file structure to the debugging workflow."

  - id: "ch11-02-file-operations-mastery-018"
    front: "Why can less handle gigabyte-sized log files while cat cannot?"
    back: "BECAUSE less does not load the entire file into memory — it streams content on demand, THEREFORE it works on files of any size without flooding the terminal."
    tags: ["less", "reading"]
    difficulty: "advanced"
    why: "Contrasts memory loading strategies of two reading commands."

  - id: "ch11-02-file-operations-mastery-019"
    front: "What key quits both less and man page viewers?"
    back: "Press q to quit the viewer."
    tags: ["less", "man", "navigation"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-020"
    front: "What does the * wildcard match in a file pattern?"
    back: "Any number of characters (including zero)."
    tags: ["wildcards", "globbing"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-021"
    front: "Why would you choose the ? wildcard over * when listing files?"
    back: "BECAUSE ? matches exactly one character while * matches any number, THEREFORE ? gives precise control to filter by name length — for example, excluding multi-digit numbered files."
    tags: ["wildcards", "globbing"]
    difficulty: "intermediate"
    why: "Tests judgment about when precision matters more than broad matching."

  - id: "ch11-02-file-operations-mastery-022"
    front: "Given files agent-1.log through agent-12.log, how would you list only single-digit ones?"
    back: "ls agent-?.log — BECAUSE ? matches exactly one character, it excludes agent-12.log which has two digits between the hyphen and dot."
    tags: ["wildcards", "globbing"]
    difficulty: "advanced"
    why: "Tests applying wildcard precision to filter files by name length."

  - id: "ch11-02-file-operations-mastery-023"
    front: "Why would using > instead of >> to write log entries cause data loss?"
    back: "BECAUSE > overwrites the entire file with new content while >> appends to the end, THEREFORE using > on a log file destroys all previous entries every time you write."
    tags: ["redirection", "file-writing"]
    difficulty: "intermediate"
    why: "Applies redirection operators to a real scenario where the wrong choice is destructive."

  - id: "ch11-02-file-operations-mastery-024"
    front: "What is the minimum viable safety habit from this lesson before editing any critical file?"
    back: "cp file file.backup before making changes."
    tags: ["safety", "best-practices"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-025"
    front: "How does rm -v help prevent silent deletion mistakes?"
    back: "BECAUSE -v prints each filename as it is deleted, you get real-time visibility into what rm is removing, THEREFORE unexpected filenames in the output alert you to stop before more damage is done."
    tags: ["rm", "flags", "safety"]
    difficulty: "intermediate"
    why: "Connects verbose output to an active safety feedback loop."

  - id: "ch11-02-file-operations-mastery-026"
    front: "Why should you run ls before every destructive command, especially when you have done it many times before?"
    back: "BECAUSE muscle memory is when you are most likely to type the wrong path — repetition breeds overconfidence, THEREFORE verifying the target with ls catches mistakes that experience alone cannot prevent."
    tags: ["safety", "best-practices"]
    difficulty: "advanced"
    why: "Challenges the assumption that familiarity reduces risk."

  - id: "ch11-02-file-operations-mastery-027"
    front: "What does the --help flag do on most Linux commands?"
    back: "Prints a usage summary with available options."
    tags: ["help", "documentation"]
    difficulty: "basic"

  - id: "ch11-02-file-operations-mastery-028"
    front: "How do you search for a specific term inside a man page?"
    back: "Type / followed by the search term, then n to jump to the next match."
    tags: ["man", "documentation"]
    difficulty: "intermediate"

  - id: "ch11-02-file-operations-mastery-029"
    front: "If you accidentally rm a config file on Linux, what recovery options exist?"
    back: "BECAUSE rm is permanent with no trash folder, recovery depends entirely on prevention — backups, version control, or filesystem snapshots, THEREFORE the real strategy is defensive habits, not after-the-fact recovery."
    tags: ["rm", "safety", "recovery"]
    difficulty: "advanced"
    why: "Reinforces that Linux deletion recovery is about prevention, not restoration."

  - id: "ch11-02-file-operations-mastery-030"
    front: "What four subdirectories does a typical agent workspace contain and what is each for?"
    back: "src — source code.\nconfig — settings.\nlogs — runtime output.\ndata — persistent storage."
    tags: ["workspace", "organization"]
    difficulty: "intermediate"
