deck:
  id: "ch11-09-process-control-systemd"
  title: "Process Control & Systemd Services"
  description: "Deploy AI agents as production systemd services with restart policies, start-limit protection, resource limits, and centralized logging."
  tags: ["systemd", "services", "daemon", "journalctl", "resource-limits", "linux"]
  version: 1

cards:
  # --- RECALL CARDS (R) ---

  - id: "ch11-09-process-control-systemd-001"
    front: "What are the three sections of a systemd .service file?"
    back: "[Unit], [Service], and [Install]"
    tags: ["systemd", "service-file"]
    difficulty: "basic"

  - id: "ch11-09-process-control-systemd-002"
    front: "What is a daemon in Linux?"
    back: "A background service process that runs independently of any user session."
    tags: ["daemon", "concepts"]
    difficulty: "basic"

  - id: "ch11-09-process-control-systemd-003"
    front: "What command tells systemd to re-read changed service files?"
    back: "sudo systemctl daemon-reload"
    tags: ["systemctl", "commands"]
    difficulty: "basic"

  - id: "ch11-09-process-control-systemd-004"
    front: "What is the difference between systemctl start and systemctl enable?"
    back: "start launches the service now.\nenable configures it to start on boot.\nenable does NOT start the service."
    tags: ["systemctl", "lifecycle"]
    difficulty: "basic"

  - id: "ch11-09-process-control-systemd-005"
    front: "What does the [Unit] section of a service file control?"
    back: "Identity and ordering: Description names the service, After sets startup dependencies."
    tags: ["systemd", "service-file"]
    difficulty: "basic"

  - id: "ch11-09-process-control-systemd-006"
    front: "What directive makes a service start during normal boot?"
    back: "WantedBy=multi-user.target in the [Install] section."
    tags: ["systemd", "boot"]
    difficulty: "basic"

  - id: "ch11-09-process-control-systemd-007"
    front: "What command follows service logs in real time, like tail -f?"
    back: "journalctl -u service-name -f"
    tags: ["journalctl", "logging"]
    difficulty: "basic"

  - id: "ch11-09-process-control-systemd-008"
    front: "What journalctl flag filters logs to a specific service?"
    back: "-u (unit), e.g., journalctl -u my-agent"
    tags: ["journalctl", "logging"]
    difficulty: "basic"

  - id: "ch11-09-process-control-systemd-009"
    front: "What Linux kernel feature does systemd use to enforce MemoryMax and CPUQuota?"
    back: "cgroups (control groups)"
    tags: ["resource-limits", "cgroups"]
    difficulty: "intermediate"

  - id: "ch11-09-process-control-systemd-010"
    front: "What command validates a service file for syntax errors?"
    back: "systemd-analyze verify /path/to/service-file"
    tags: ["systemd", "validation"]
    difficulty: "intermediate"

  - id: "ch11-09-process-control-systemd-011"
    front: "What status message does systemd show when start-limit protection triggers?"
    back: "Active: failed (Result: start-limit-hit)"
    tags: ["start-limit", "troubleshooting"]
    difficulty: "intermediate"

  - id: "ch11-09-process-control-systemd-012"
    front: "What two commands reset a failed service so it can start again?"
    back: "sudo systemctl reset-failed my-agent\nsudo systemctl start my-agent"
    tags: ["systemctl", "troubleshooting"]
    difficulty: "intermediate"

  - id: "ch11-09-process-control-systemd-013"
    front: "What does CPUQuota=25% mean for a systemd service?"
    back: "The service can use at most 25% of one CPU core."
    tags: ["resource-limits", "cpu"]
    difficulty: "intermediate"

  - id: "ch11-09-process-control-systemd-014"
    front: "What command verifies the resource limits applied to a running service?"
    back: "systemctl show my-agent --property=MemoryMax,CPUQuota"
    tags: ["systemctl", "resource-limits"]
    difficulty: "intermediate"

  # --- THINKING CARDS (T) ---

  - id: "ch11-09-process-control-systemd-015"
    front: "Why is Restart=on-failure preferred over Restart=always for production agents?"
    back: "BECAUSE Restart=always restarts even after intentional systemctl stop, preventing clean shutdowns. THEREFORE on-failure gives operators control: crashes auto-recover, but deliberate stops stay stopped."
    tags: ["restart-policy", "production"]
    difficulty: "intermediate"
    why: "Understanding restart semantics prevents inability to stop misbehaving services."

  - id: "ch11-09-process-control-systemd-016"
    front: "Why must ExecStart use absolute paths in a service file?"
    back: "BECAUSE systemd runs services without a user shell session, so PATH environment variable is minimal. THEREFORE relative paths or bare command names fail to resolve."
    tags: ["systemd", "service-file"]
    difficulty: "intermediate"
    why: "Service context differs from interactive shell context in environment variables."

  - id: "ch11-09-process-control-systemd-017"
    front: "Why does start-limit protection exist alongside restart policies?"
    back: "BECAUSE a fatally broken agent crashes immediately on every startup, creating a tight crash-restart loop. THEREFORE StartLimitBurst caps retries within a time window to prevent resource exhaustion from restart storms."
    tags: ["start-limit", "restart-policy"]
    difficulty: "intermediate"
    why: "Restart policies alone cannot distinguish recoverable from permanently broken failures."

  - id: "ch11-09-process-control-systemd-018"
    front: "Why should you set MemoryMax on every production agent service?"
    back: "BECAUSE a memory leak in one agent gradually consumes all server RAM. THEREFORE MemoryMax contains the damage to a single service, preventing it from crashing the entire server."
    tags: ["resource-limits", "production"]
    difficulty: "intermediate"
    why: "Unbounded resource usage in one process threatens all co-located services."

  - id: "ch11-09-process-control-systemd-019"
    front: "Why is systemd better than tmux for running production agents?"
    back: "BECAUSE tmux sessions die on reboot, lack restart policies, and have no centralized logging. THEREFORE systemd provides automatic boot start, crash recovery, and journalctl log history that tmux cannot."
    tags: ["systemd", "tmux", "production"]
    difficulty: "intermediate"
    why: "Choosing the right process supervisor determines agent reliability."

  - id: "ch11-09-process-control-systemd-020"
    front: "Why does the health check script test the HTTP endpoint, not just systemctl is-active?"
    back: "BECAUSE a service can be active (running) while the application inside has deadlocked or stopped responding. THEREFORE checking the health endpoint confirms the agent is actually working, not just alive."
    tags: ["health-check", "monitoring"]
    difficulty: "advanced"
    why: "Process liveness and application readiness are distinct operational concerns."

  - id: "ch11-09-process-control-systemd-021"
    front: "How do RestartSec, StartLimitBurst, and StartLimitIntervalSec interact?"
    back: "RestartSec sets delay between restart attempts. StartLimitBurst sets max starts allowed within StartLimitIntervalSec. THEREFORE if the service crashes StartLimitBurst times within the interval, systemd stops restarting and enters failed state."
    tags: ["start-limit", "restart-policy"]
    difficulty: "advanced"
    why: "The three directives form a coordinated protection system, not independent settings."

  - id: "ch11-09-process-control-systemd-022"
    front: "Why should agents run as a non-root user like User=nobody?"
    back: "BECAUSE a compromised or buggy agent running as root can modify any system file or process. THEREFORE running as a dedicated non-root user limits blast radius through OS-level permission boundaries."
    tags: ["security", "service-file"]
    difficulty: "advanced"
    why: "Least-privilege principle applies to service execution identity."

  - id: "ch11-09-process-control-systemd-023"
    front: "Why is Restart=always considered dangerous for production?"
    back: "BECAUSE always-restart masks bugs by endlessly restarting a broken agent without investigation. THEREFORE the root cause is never fixed while the restart storm consumes CPU and memory."
    tags: ["restart-policy", "anti-patterns"]
    difficulty: "intermediate"
    why: "Auto-recovery that hides failures is worse than visible failure."

  - id: "ch11-09-process-control-systemd-024"
    front: "Why does journalctl centralize logging instead of using scattered log files?"
    back: "BECAUSE multiple services writing to separate files makes correlation and search difficult. THEREFORE a single journal with unit filtering, time ranges, and priority levels provides unified observability."
    tags: ["journalctl", "observability"]
    difficulty: "advanced"
    why: "Operational efficiency requires querying all service logs from one interface."

  - id: "ch11-09-process-control-systemd-025"
    front: "What happens if MemoryMax is exceeded by a service?"
    back: "BECAUSE MemoryMax is a hard ceiling enforced by cgroups, the kernel sends SIGKILL to the process immediately. THEREFORE the service is terminated without graceful shutdown when the limit is breached."
    tags: ["resource-limits", "cgroups"]
    difficulty: "advanced"
    why: "Hard limits protect the system but kill the offending process ungracefully."
