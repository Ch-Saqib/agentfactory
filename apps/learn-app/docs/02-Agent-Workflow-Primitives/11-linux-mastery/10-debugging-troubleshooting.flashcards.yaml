deck:
  id: "ch11-10-debugging-troubleshooting"
  title: "Debugging & Troubleshooting"
  description: "Systematic diagnosis of production agent failures using journalctl, network diagnosis, disk monitoring, and process debugging."
  tags: ["debugging", "troubleshooting", "journalctl", "triage", "linux"]
  version: 1

cards:
  - id: "ch11-10-debugging-troubleshooting-001"
    front: "What is the correct triage order for diagnosing a failing agent?"
    back: "Logs -> Network -> Disk -> Processes"
    tags: ["triage"]
    difficulty: "basic"

  - id: "ch11-10-debugging-troubleshooting-002"
    front: "Why should you always check logs before restarting a failed service?"
    back: "BECAUSE restarting without understanding the failure means the same crash will happen again — a full disk stays full, a memory leak leaks again. THEREFORE reading logs is the only path to the actual root cause."
    tags: ["triage", "logs"]
    difficulty: "intermediate"
    why: "Restarting feels productive but produces no diagnostic information."

  - id: "ch11-10-debugging-troubleshooting-003"
    front: "What journalctl flag filters logs to a specific systemd service?"
    back: "-u (unit), e.g. journalctl -u my-agent"
    tags: ["journalctl"]
    difficulty: "basic"

  - id: "ch11-10-debugging-troubleshooting-004"
    front: "What does journalctl -f do?"
    back: "Follows (streams) logs in real time, like tail -f for the system journal."
    tags: ["journalctl"]
    difficulty: "basic"

  - id: "ch11-10-debugging-troubleshooting-005"
    front: "What journalctl flag filters by log severity level?"
    back: "-p (priority), e.g. -p err shows errors and above"
    tags: ["journalctl"]
    difficulty: "basic"

  - id: "ch11-10-debugging-troubleshooting-006"
    front: "Why does journalctl -p err include levels 0 through 3 instead of just level 3?"
    back: "BECAUSE -p filters by minimum severity, including everything more severe than the specified level. THEREFORE -p err captures emerg, alert, crit, and err — all conditions requiring attention, not just exact error matches."
    tags: ["journalctl"]
    difficulty: "intermediate"
    why: "Priority filtering is inclusive of all levels more severe than the one specified."

  - id: "ch11-10-debugging-troubleshooting-007"
    front: "Why does the triage methodology proceed in the order logs, network, disk, then processes?"
    back: "BECAUSE logs reveal the root cause in roughly 80% of cases with minimal effort. THEREFORE checking logs first maximizes diagnostic yield, and each subsequent phase is only needed when the prior phase is clean."
    tags: ["triage"]
    difficulty: "intermediate"
    why: "Skipping phases or starting with process debugging wastes time on symptoms."

  - id: "ch11-10-debugging-troubleshooting-008"
    front: "What two journalctl flags restrict output to a specific time window?"
    back: "--since and --until\ne.g. --since \"2026-02-11 14:00\" --until \"2026-02-11 15:00\""
    tags: ["journalctl"]
    difficulty: "basic"

  - id: "ch11-10-debugging-troubleshooting-009"
    front: "What is the four-layer network diagnosis sequence?"
    back: "1. curl localhost (local service)\n2. ss -tlnp (port binding)\n3. ping (DNS/connectivity)\n4. curl remote (remote service)"
    tags: ["network"]
    difficulty: "intermediate"

  - id: "ch11-10-debugging-troubleshooting-010"
    front: "Why should network diagnosis proceed from local to remote?"
    back: "BECAUSE testing local first eliminates the simplest failures before checking external dependencies. THEREFORE if localhost fails, you know the problem is your service — not DNS, firewalls, or remote servers."
    tags: ["network"]
    difficulty: "intermediate"
    why: "Each layer narrows the possible failure location systematically."

  - id: "ch11-10-debugging-troubleshooting-011"
    front: "What does the ss -tlnp command show?"
    back: "TCP ports in LISTEN state with process names and PIDs bound to them."
    tags: ["network"]
    difficulty: "basic"

  - id: "ch11-10-debugging-troubleshooting-012"
    front: "Why does empty output from ss -tlnp for your port mean you should go back to Phase 1?"
    back: "BECAUSE no output means nothing is bound to that port — the agent is not running. THEREFORE the failure is not network-related; you need to check logs to find why the process exited."
    tags: ["network"]
    difficulty: "intermediate"
    why: "An unbound port is a process problem, not a network problem."

  - id: "ch11-10-debugging-troubleshooting-013"
    front: "What is the difference between df -h and du -sh?"
    back: "df -h shows overall filesystem usage per mount point.\ndu -sh shows size of specific directories or files."
    tags: ["disk"]
    difficulty: "intermediate"

  - id: "ch11-10-debugging-troubleshooting-014"
    front: "Why is disk space exhaustion called a silent killer of production agents?"
    back: "BECAUSE agents that generate logs, cache responses, or store outputs can fill a disk gradually without warnings. THEREFORE services crash with cryptic errors like write failures or silent hangs, not obvious disk-full messages."
    tags: ["disk"]
    difficulty: "intermediate"
    why: "Unrotated logs from lesson 6 are the number one cause."

  - id: "ch11-10-debugging-troubleshooting-015"
    front: "At what disk usage percentage do services typically start failing?"
    back: "Above 95% usage. The danger zone begins at 90%."
    tags: ["disk"]
    difficulty: "basic"

  - id: "ch11-10-debugging-troubleshooting-016"
    front: "What command reclaims space from the systemd journal?"
    back: "sudo journalctl --vacuum-size=500M"
    tags: ["disk", "journalctl"]
    difficulty: "basic"

  - id: "ch11-10-debugging-troubleshooting-017"
    front: "Why use strace -c instead of full strace on a production process?"
    back: "BECAUSE full strace traces every individual system call, adding significant overhead to each one. THEREFORE -c provides a statistical summary with minimal performance impact, making it safe for production use."
    tags: ["processes"]
    difficulty: "advanced"
    why: "Full tracing can slow a production process noticeably during peak traffic."

  - id: "ch11-10-debugging-troubleshooting-018"
    front: "Why is strace considered a last resort rather than a first diagnostic step?"
    back: "BECAUSE strace adds overhead to every system call and most problems are caught at the log or network layer. THEREFORE using strace first on production during peak traffic degrades performance unnecessarily."
    tags: ["processes"]
    difficulty: "advanced"
    why: "Logs and network checks are cheaper and solve 80%+ of issues."

  - id: "ch11-10-debugging-troubleshooting-019"
    front: "What does lsof -p PID reveal about a running process?"
    back: "Every open file, network connection, and file descriptor the process holds."
    tags: ["processes"]
    difficulty: "intermediate"

  - id: "ch11-10-debugging-troubleshooting-020"
    front: "Why does a steadily growing lsof count indicate a file descriptor leak?"
    back: "BECAUSE each open file, socket, or connection consumes a file descriptor, and healthy processes close them after use. THEREFORE a count that only increases means the process opens resources without releasing them, eventually hitting system limits."
    tags: ["processes"]
    difficulty: "advanced"
    why: "File descriptor exhaustion causes new connections and file opens to fail."

  - id: "ch11-10-debugging-troubleshooting-021"
    front: "Why should you prefer read-only diagnostic commands on production servers before modifying state?"
    back: "BECAUSE commands like journalctl, df, ps, and ss capture evidence without altering system state. THEREFORE restarting or modifying a service first can destroy the logs and conditions needed to identify root cause."
    tags: ["triage", "production"]
    difficulty: "advanced"
    why: "Evidence preservation is critical — a restart clears the failure state."

  - id: "ch11-10-debugging-troubleshooting-022"
    front: "What does the free -h command display?"
    back: "System memory usage: total, used, free, shared, buff/cache, and available RAM."
    tags: ["processes"]
    difficulty: "basic"

  - id: "ch11-10-debugging-troubleshooting-023"
    front: "Why is logrotate essential for long-running agent services?"
    back: "BECAUSE agents write logs continuously and without rotation, log files grow until the disk is full. THEREFORE logrotate caps growth by rotating daily, keeping limited history, and compressing old files automatically."
    tags: ["disk"]
    difficulty: "intermediate"
    why: "Disk exhaustion from unrotated logs is the top silent killer of production agents."

  - id: "ch11-10-debugging-troubleshooting-024"
    front: "Why does the MemoryError scenario require checking both free -h and MemoryMax?"
    back: "BECAUSE a MemoryError could be caused by system-wide RAM exhaustion or by a per-service memory limit set in the systemd unit. THEREFORE checking both distinguishes whether the fix is increasing the limit or optimizing the agent's memory usage."
    tags: ["logs", "processes"]
    difficulty: "advanced"
    why: "Two different root causes require two different fixes."
