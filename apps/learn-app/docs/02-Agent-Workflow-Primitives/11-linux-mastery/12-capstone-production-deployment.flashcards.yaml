deck:
  id: "ch11-12-capstone-production-deployment"
  title: "Capstone: Spec-First Production Deployment"
  description: "Flashcards covering deployment specifications, layered validation, systemd service configuration, idempotent scripting, and production deployment packaging."
  tags: ["capstone", "production-deployment", "systemd", "deployment-spec", "layered-validation", "linux"]
  version: 1

cards:
  # --- RECALL CARDS ---

  - id: "ch11-12-capstone-production-deployment-001"
    front: "What are the four sections of a DEPLOYMENT-SPEC.md?"
    back: "1. Service Definition\n2. Security Requirements\n3. Monitoring Plan\n4. Validation Criteria"
    tags: ["deployment-spec"]
    difficulty: "basic"

  - id: "ch11-12-capstone-production-deployment-002"
    front: "What are the five layers in the layered validation script?"
    back: "1. Service (active)\n2. Network (health endpoint)\n3. Security (correct user)\n4. Monitoring (logs flowing)\n5. Resources (limits applied)"
    tags: ["layered-validation"]
    difficulty: "basic"

  - id: "ch11-12-capstone-production-deployment-003"
    front: "What command creates a dedicated system user with no login shell for production deployment?"
    back: "sudo useradd -r -s /usr/sbin/nologin agent-prod"
    tags: ["security", "linux-commands"]
    difficulty: "basic"

  - id: "ch11-12-capstone-production-deployment-004"
    front: "What does the -r flag do when passed to useradd?"
    back: "Creates a system user with a low UID and no home directory."
    tags: ["security", "linux-commands"]
    difficulty: "basic"

  - id: "ch11-12-capstone-production-deployment-005"
    front: "What value does systemctl show MemoryMax report for a 512MB limit?"
    back: "536870912 (512 MB in bytes)."
    tags: ["systemd", "resources"]
    difficulty: "intermediate"

  - id: "ch11-12-capstone-production-deployment-006"
    front: "What two systemd directives control restart rate-limiting in the [Unit] section?"
    back: "StartLimitBurst (max attempts) and StartLimitIntervalSec (time window)."
    tags: ["systemd"]
    difficulty: "intermediate"

  - id: "ch11-12-capstone-production-deployment-007"
    front: "What command must you run after editing a systemd service file before the changes take effect?"
    back: "sudo systemctl daemon-reload"
    tags: ["systemd"]
    difficulty: "basic"

  - id: "ch11-12-capstone-production-deployment-008"
    front: "How do you verify the agent process is running as the correct user and not root?"
    back: "ps -eo user,comm | grep uvicorn"
    tags: ["security", "validation"]
    difficulty: "intermediate"

  - id: "ch11-12-capstone-production-deployment-009"
    front: "What does set -e do at the top of a bash deployment script?"
    back: "Exits the script immediately if any command fails."
    tags: ["scripting"]
    difficulty: "basic"

  - id: "ch11-12-capstone-production-deployment-010"
    front: "What firewall command opens port 8000 for TCP agent traffic?"
    back: "sudo ufw allow 8000/tcp"
    tags: ["security", "networking"]
    difficulty: "basic"

  - id: "ch11-12-capstone-production-deployment-011"
    front: "What systemd directive sets a 25% CPU ceiling for a service?"
    back: "CPUQuota=25%"
    tags: ["systemd", "resources"]
    difficulty: "intermediate"

  # --- THINKING CARDS ---

  - id: "ch11-12-capstone-production-deployment-012"
    front: "Why write a deployment specification before touching the terminal?"
    back: "BECAUSE a written spec defines testable success criteria upfront, THEREFORE every command traces to a requirement and nothing is ad-hoc. Without a spec, you type commands until something works and hope it keeps working."
    tags: ["deployment-spec", "methodology"]
    difficulty: "intermediate"
    why: "Connects process discipline to deployment reliability and debuggability."

  - id: "ch11-12-capstone-production-deployment-013"
    front: "Why use Restart=on-failure instead of Restart=always in systemd?"
    back: "BECAUSE always restarts the service even after a deliberate systemctl stop, THEREFORE you cannot cleanly stop your own service without disabling it first. on-failure gives automatic crash recovery while preserving intentional stop control."
    tags: ["systemd"]
    difficulty: "intermediate"
    why: "Distinguishes crash recovery from overriding operator intent."

  - id: "ch11-12-capstone-production-deployment-014"
    front: "Why must a deploy.sh script be idempotent?"
    back: "BECAUSE real deployments get re-run after updates, migrations, and debugging, THEREFORE a script that fails on its second run is not production-ready. Idempotency means checking if resources exist before creating them."
    tags: ["scripting", "deployment"]
    difficulty: "intermediate"
    why: "Links repeatability to real-world deployment lifecycle demands."

  - id: "ch11-12-capstone-production-deployment-015"
    front: "Why does layered validation test five separate dimensions instead of one check?"
    back: "BECAUSE a service can be active yet fail at the network, security, monitoring, or resource layer, THEREFORE single-point checks miss entire categories of failure. Each layer tests a different dimension of correctness."
    tags: ["layered-validation"]
    difficulty: "intermediate"
    why: "Shows how single-point verification creates false confidence in deployments."

  - id: "ch11-12-capstone-production-deployment-016"
    front: "Why run an agent as a dedicated non-root user?"
    back: "BECAUSE a process running as root can modify any system file if compromised, THEREFORE a dedicated user with no login shell limits blast radius. The agent reads its own files but cannot damage the wider system."
    tags: ["security"]
    difficulty: "intermediate"
    why: "Explains the security principle of least privilege in deployment context."

  - id: "ch11-12-capstone-production-deployment-017"
    front: "Why is packaging a deployment into a script important for production?"
    back: "BECAUSE manual commands are unreproducible and error-prone under pressure, THEREFORE a scripted deployment lets anyone reproduce the exact same result on a clean server. It eliminates reliance on memory or notes."
    tags: ["deployment", "scripting"]
    difficulty: "advanced"
    why: "Connects reproducibility to operational resilience and team scalability."

  - id: "ch11-12-capstone-production-deployment-018"
    front: "How does start-limit protection prevent a crash loop from consuming resources?"
    back: "BECAUSE StartLimitBurst=5 and StartLimitIntervalSec=60 cap restarts at 5 within 60 seconds, THEREFORE systemd stops attempting recovery after repeated failures. This prevents infinite restart loops from saturating CPU and logs."
    tags: ["systemd", "resources"]
    difficulty: "advanced"
    why: "Explains how unbounded restarts can be worse than a stopped service."

  - id: "ch11-12-capstone-production-deployment-019"
    front: "Why should validation layer failures be traced back to the deployment spec?"
    back: "BECAUSE each validation check maps to a specific spec requirement, THEREFORE tracing failures back to the spec tells you exactly what to fix and how to verify the fix. The spec is both the implementation guide and the debugging map."
    tags: ["layered-validation", "deployment-spec"]
    difficulty: "advanced"
    why: "Shows specs as living documents that aid debugging, not just planning."

  - id: "ch11-12-capstone-production-deployment-020"
    front: "Why test deploy.sh on a clean workspace before considering it production-ready?"
    back: "BECAUSE scripts can silently depend on pre-existing state from manual setup, THEREFORE testing on a clean workspace proves true reproducibility. If it only works where you already configured things manually, it is not self-contained."
    tags: ["deployment", "scripting"]
    difficulty: "advanced"
    why: "Reveals hidden dependencies that manual testing on existing servers masks."
