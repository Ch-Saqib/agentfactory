deck:
  id: "ch11-06-text-processing-automation"
  title: "Text Processing & Automation"
  description: "Flashcards covering grep, sed, awk, multi-tool pipelines, cron scheduling, and log rotation for agent log analysis."
  tags: ["grep", "sed", "awk", "cron", "pipelines", "log-rotation", "text-processing"]
  version: 1

cards:
  # --- RECALL CARDS (R) ---

  - id: "ch11-06-text-processing-automation-001"
    front: "What does the grep -c flag do?"
    back: "Returns a count of matching lines instead of printing them."
    tags: ["grep"]
    difficulty: "basic"

  - id: "ch11-06-text-processing-automation-002"
    front: "What does the grep -v flag do?"
    back: "Inverts the match — prints lines that do NOT contain the pattern."
    tags: ["grep"]
    difficulty: "basic"

  - id: "ch11-06-text-processing-automation-003"
    front: "What does the grep -E flag enable?"
    back: "Extended regular expressions, allowing patterns like | for OR matching."
    tags: ["grep", "regex"]
    difficulty: "basic"

  - id: "ch11-06-text-processing-automation-004"
    front: "In grep, what do the -C, -B, and -A flags control?"
    back: "-C = context (before + after)\n-B = before only\n-A = after only"
    tags: ["grep"]
    difficulty: "intermediate"

  - id: "ch11-06-text-processing-automation-005"
    front: "In the sed substitution command s/old/new/, what does adding g at the end do?"
    back: "Replaces all occurrences on the line, not just the first."
    tags: ["sed"]
    difficulty: "basic"

  - id: "ch11-06-text-processing-automation-006"
    front: "What does the sed syntax /pattern/d do?"
    back: "Deletes every line matching the pattern."
    tags: ["sed"]
    difficulty: "basic"

  - id: "ch11-06-text-processing-automation-007"
    front: "In awk, what do $1, $2, and $NF represent?"
    back: "$1 = first field\n$2 = second field\n$NF = last field on the line"
    tags: ["awk"]
    difficulty: "basic"

  - id: "ch11-06-text-processing-automation-008"
    front: "What are the five fields in crontab time syntax, in order?"
    back: "Minute (0-59)\nHour (0-23)\nDay of month (1-31)\nMonth (1-12)\nDay of week (0-7)"
    tags: ["cron"]
    difficulty: "intermediate"

  - id: "ch11-06-text-processing-automation-009"
    front: "What does the cron expression 0 2 * * * mean?"
    back: "Run at 2:00 AM every day."
    tags: ["cron"]
    difficulty: "intermediate"

  - id: "ch11-06-text-processing-automation-010"
    front: "What does the cron expression */5 * * * * mean?"
    back: "Runs every 5 minutes (at :00, :05, :10, :15...)."
    tags: ["cron"]
    difficulty: "intermediate"

  - id: "ch11-06-text-processing-automation-011"
    front: "What does the ? wildcard match in a glob pattern?"
    back: "Exactly one character."
    tags: ["globbing"]
    difficulty: "basic"

  - id: "ch11-06-text-processing-automation-012"
    front: "What does the * wildcard match in a glob pattern?"
    back: "Zero or more characters."
    tags: ["globbing"]
    difficulty: "basic"

  - id: "ch11-06-text-processing-automation-013"
    front: "What does crontab -r do?"
    back: "Removes ALL scheduled cron jobs, not just one."
    tags: ["cron"]
    difficulty: "intermediate"

  - id: "ch11-06-text-processing-automation-014"
    front: "What does the output redirection 2>&1 mean in a cron job?"
    back: "Redirects stderr to the same destination as stdout."
    tags: ["cron"]
    difficulty: "intermediate"

  # --- THINKING CARDS (T) ---

  - id: "ch11-06-text-processing-automation-015"
    front: "Why should you always test sed without -i before using -i?"
    back: "BECAUSE sed -i edits the file in place permanently with no undo. THEREFORE testing without -i first lets you preview the result on stdout before committing destructive changes."
    tags: ["sed", "safety"]
    difficulty: "intermediate"
    why: "Connects in-place editing to irreversibility and safe workflow habits."

  - id: "ch11-06-text-processing-automation-016"
    front: "Why do scripts that work interactively often fail when run by cron?"
    back: "BECAUSE cron runs commands with a minimal PATH environment. THEREFORE scripts must define PATH explicitly or use absolute paths for every command."
    tags: ["cron"]
    difficulty: "advanced"
    why: "Links cron's minimal environment to the common failure of missing commands."

  - id: "ch11-06-text-processing-automation-017"
    front: "How do grep, sed, and awk differ in their primary roles within a pipeline?"
    back: "grep finds matching lines, sed transforms text within lines, and awk extracts and computes across fields. THEREFORE they complement each other — grep filters, sed edits, awk analyzes."
    tags: ["pipelines", "grep", "sed", "awk"]
    difficulty: "intermediate"
    why: "Tests understanding of each tool's distinct responsibility in a processing chain."

  - id: "ch11-06-text-processing-automation-018"
    front: "Why does the pipeline use sort before uniq -c?"
    back: "BECAUSE uniq only detects adjacent duplicate lines. THEREFORE sort must group identical lines together first so uniq -c can count all occurrences accurately."
    tags: ["pipelines"]
    difficulty: "intermediate"
    why: "Reveals the hidden dependency between sort and uniq in counting pipelines."

  - id: "ch11-06-text-processing-automation-019"
    front: "Why is log rotation necessary for long-running agents?"
    back: "BECAUSE agents logging continuously produce thousands of lines per hour. THEREFORE without rotation, log files grow until they fill the disk and the agent crashes."
    tags: ["log-rotation"]
    difficulty: "intermediate"
    why: "Connects unbounded log growth to production system failure."

  - id: "ch11-06-text-processing-automation-020"
    front: "Why is piping output to the same file you are reading dangerous?"
    back: "BECAUSE the shell truncates the output file before the read command starts. THEREFORE the input file becomes zero bytes and all data is lost."
    tags: ["pipelines", "safety"]
    difficulty: "advanced"
    why: "Explains the race condition between shell redirection and file reading."

  - id: "ch11-06-text-processing-automation-021"
    front: "How does awk use associative arrays to count error types?"
    back: "awk uses a field value as an array key and increments it with count[$4]++. THEREFORE after processing all lines, the END block iterates the array to print each key with its total count."
    tags: ["awk"]
    difficulty: "advanced"
    why: "Tests understanding of awk's aggregation pattern beyond simple field extraction."

  - id: "ch11-06-text-processing-automation-022"
    front: "Why chain small Unix tools with pipes instead of writing one script that does everything?"
    back: "BECAUSE each tool does one thing well, they can be recombined for new tasks without rewriting. THEREFORE pipelines are more flexible and reusable than monolithic scripts."
    tags: ["pipelines"]
    difficulty: "intermediate"
    why: "Connects Unix philosophy of composability to practical pipeline design."

  - id: "ch11-06-text-processing-automation-023"
    front: "Why should cron job output use >> instead of > for redirection?"
    back: "BECAUSE > overwrites the file each time the job runs, losing all previous output. THEREFORE >> appends output so you retain a history of every run."
    tags: ["cron"]
    difficulty: "intermediate"
    why: "Distinguishes append vs overwrite redirection in automated scheduling context."

  - id: "ch11-06-text-processing-automation-024"
    front: "Why use crontab -e instead of crontab -r to remove a single cron job?"
    back: "BECAUSE crontab -r removes ALL scheduled jobs, not just one. THEREFORE crontab -e lets you edit the file and delete only the specific line you want to remove."
    tags: ["cron", "safety"]
    difficulty: "advanced"
    why: "Highlights the destructive scope difference between -r and -e."

  - id: "ch11-06-text-processing-automation-025"
    front: "How does an agent logging 100 lines per minute scale over a week?"
    back: "100 lines/min produces 6,000 lines/hour, 144,000 lines/day, and over 1 million lines per week. THEREFORE disk exhaustion is inevitable without rotation."
    tags: ["log-rotation"]
    difficulty: "advanced"
    why: "Forces calculation of log growth rate to grasp urgency of rotation."

  - id: "ch11-06-text-processing-automation-026"
    front: "Why does the [] wildcard provide more precision than * for file matching?"
    back: "BECAUSE [] matches only specific characters from a defined set, while * matches any characters. THEREFORE [] lets you target exact file groups like agent-[12].log without matching unrelated files."
    tags: ["globbing"]
    difficulty: "intermediate"
    why: "Contrasts broad vs narrow pattern matching for file selection control."
