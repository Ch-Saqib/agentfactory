deck:
  id: "ch11-08-networking-ssh-remote-access"
  title: "Networking Fundamentals & SSH Remote Access"
  description: "Ports, binding addresses, curl endpoint testing, SSH connections and config, and ufw firewall rules for securing agent deployments."
  tags: ["networking", "ports", "ssh", "curl", "ufw", "firewall", "remote-access"]
  version: 1

cards:
  - id: "ch11-08-networking-ssh-remote-access-001"
    front: "What is a port in networking?"
    back: "A numbered endpoint (0-65535) on a machine that identifies a specific service."
    tags: ["ports"]
    difficulty: "basic"

  - id: "ch11-08-networking-ssh-remote-access-002"
    front: "What port range requires root privileges to bind, and why does this matter for agents?"
    back: "Ports 0-1023 (well-known ports) require root. THEREFORE agents use higher ports like 8000 to follow the least-privilege principle, avoiding unnecessary root access."
    tags: ["ports", "security"]
    difficulty: "intermediate"
    why: "Connects port ranges to security design decisions for agent deployment."

  - id: "ch11-08-networking-ssh-remote-access-003"
    front: "Which well-known port numbers correspond to SSH, HTTP, and HTTPS?"
    back: "SSH: 22\nHTTP: 80\nHTTPS: 443"
    tags: ["ports"]
    difficulty: "basic"

  - id: "ch11-08-networking-ssh-remote-access-004"
    front: "What command shows all listening TCP ports and the processes using them?"
    back: "ss -tlnp shows listening TCP ports with process info."
    tags: ["ports", "diagnostics"]
    difficulty: "basic"

  - id: "ch11-08-networking-ssh-remote-access-005"
    front: "Why does ss -tlnp use the -n flag instead of showing service names?"
    back: "BECAUSE service names can be ambiguous or missing, numeric port numbers give exact, unambiguous identification. THEREFORE -n ensures you see the actual port number your agent is bound to, not a potentially misleading label."
    tags: ["ports", "diagnostics"]
    difficulty: "intermediate"
    why: "Connects the flag choice to diagnostic reliability."

  - id: "ch11-08-networking-ssh-remote-access-006"
    front: "What does it mean when a service is bound to 127.0.0.1?"
    back: "It only accepts connections from the same machine (loopback)."
    tags: ["binding"]
    difficulty: "basic"

  - id: "ch11-08-networking-ssh-remote-access-007"
    front: "What does it mean when a service is bound to 0.0.0.0?"
    back: "It accepts connections from all network interfaces, including remote machines."
    tags: ["binding"]
    difficulty: "intermediate"

  - id: "ch11-08-networking-ssh-remote-access-008"
    front: "Why is binding to 127.0.0.1 the most common reason deployed agents are unreachable?"
    back: "BECAUSE 127.0.0.1 is the loopback address, it only accepts local connections. External traffic arrives at the server's network interface, finds nothing listening, and gets 'connection refused.' THEREFORE you must bind to 0.0.0.0 for remote access."
    tags: ["binding", "diagnostics"]
    difficulty: "intermediate"
    why: "Forces understanding of the loopback vs network interface distinction."

  - id: "ch11-08-networking-ssh-remote-access-009"
    front: "Why would you bind an agent to 127.0.0.1 during development but 0.0.0.0 in production?"
    back: "BECAUSE 127.0.0.1 blocks all external access, it is safest for development. In production, 0.0.0.0 is needed for remote clients to connect, but THEREFORE you must add firewall protection to compensate for the broader exposure."
    tags: ["binding", "security"]
    difficulty: "advanced"
    why: "Tests understanding of the security tradeoff between accessibility and exposure."

  - id: "ch11-08-networking-ssh-remote-access-010"
    front: "Why does extracting just the HTTP status code require -s -o /dev/null flags in curl?"
    back: "BECAUSE -s silences progress output and -o /dev/null discards the response body, only the -w format string remains. THEREFORE you get a clean numeric status code suitable for scripting and automated health checks."
    tags: ["curl"]
    difficulty: "intermediate"
    why: "Explains why multiple flags are needed to isolate the status code."

  - id: "ch11-08-networking-ssh-remote-access-011"
    front: "In curl output, what does HTTP status code 000 indicate?"
    back: "Connection failed -- the port has no listening service."
    tags: ["curl", "diagnostics"]
    difficulty: "basic"

  - id: "ch11-08-networking-ssh-remote-access-012"
    front: "How does 'connection refused' differ from a timeout when using curl?"
    back: "Connection refused means nothing is listening on the port. BECAUSE a timeout means something is blocking the connection (like a firewall), the diagnostic path differs: refused points to the service, timeout points to the network layer."
    tags: ["curl", "diagnostics"]
    difficulty: "intermediate"
    why: "Distinguishing error types determines which layer to debug."

  - id: "ch11-08-networking-ssh-remote-access-013"
    front: "Why must you include -H \"Content-Type: application/json\" when sending JSON with curl?"
    back: "BECAUSE the server needs to know how to parse the request body, the Content-Type header tells it to interpret -d data as JSON. THEREFORE without this header, the server may reject or misparse your agent API request."
    tags: ["curl"]
    difficulty: "intermediate"
    why: "Explains the role of Content-Type in server-side request parsing."

  - id: "ch11-08-networking-ssh-remote-access-014"
    front: "What command copies your SSH public key to a remote server?"
    back: "ssh-copy-id user@host"
    tags: ["ssh"]
    difficulty: "basic"

  - id: "ch11-08-networking-ssh-remote-access-016"
    front: "Where does SSH store accepted server fingerprints on the client?"
    back: "~/.ssh/known_hosts"
    tags: ["ssh"]
    difficulty: "basic"

  - id: "ch11-08-networking-ssh-remote-access-017"
    front: "Why does SSH ask you to verify a server's fingerprint on first connection?"
    back: "BECAUSE an attacker could impersonate the server (man-in-the-middle attack), verifying the fingerprint confirms you are connecting to the real server. THEREFORE the fingerprint is saved to known_hosts so SSH can detect imposters on future connections."
    tags: ["ssh", "security"]
    difficulty: "intermediate"
    why: "Connects fingerprint verification to the threat model it defends against."

  - id: "ch11-08-networking-ssh-remote-access-018"
    front: "What SSH flags specify a non-standard port and a specific key file?"
    back: "-p PORT for port\n-i PATH for identity (key) file"
    tags: ["ssh"]
    difficulty: "intermediate"

  - id: "ch11-08-networking-ssh-remote-access-019"
    front: "Why does SSH config separate Host from HostName into two fields?"
    back: "BECAUSE Host is a user-defined alias for convenience and HostName is the real server address, separating them lets you type 'ssh agent-prod' instead of remembering IP addresses. THEREFORE you get both usability and accuracy."
    tags: ["ssh-config"]
    difficulty: "intermediate"
    why: "Explains the design rationale behind the alias/address separation."

  - id: "ch11-08-networking-ssh-remote-access-020"
    front: "What permissions must ~/.ssh/config have, and why?"
    back: "600 (owner read/write only). BECAUSE SSH refuses to use a config file with loose permissions, this prevents other users from reading your server credentials and connection details."
    tags: ["ssh-config", "security"]
    difficulty: "intermediate"
    why: "Links file permission enforcement to the security risk of exposed connection details."

  - id: "ch11-08-networking-ssh-remote-access-021"
    front: "What is the Host field in ~/.ssh/config?"
    back: "A user-defined alias (shortcut) for a server connection."
    tags: ["ssh-config"]
    difficulty: "basic"

  - id: "ch11-08-networking-ssh-remote-access-022"
    front: "Why must you keep a backup SSH session open when modifying sshd_config?"
    back: "BECAUSE a misconfigured sshd_config can prevent new SSH connections, your existing session stays open (already authenticated). THEREFORE if the new config locks you out, you can use the backup session to revert changes."
    tags: ["ssh", "security"]
    difficulty: "advanced"
    why: "Tests understanding of the difference between existing and new SSH sessions."

  - id: "ch11-08-networking-ssh-remote-access-023"
    front: "Why should you set PermitRootLogin to no in sshd_config?"
    back: "BECAUSE allowing direct root SSH means an attacker who compromises a key has full system access immediately. THEREFORE forcing login as a regular user and using sudo adds an extra authentication barrier and creates an audit trail."
    tags: ["ssh", "security"]
    difficulty: "intermediate"
    why: "Connects the setting to the security principle of least privilege."

  - id: "ch11-08-networking-ssh-remote-access-024"
    front: "Why should you run sshd -t before restarting the SSH service?"
    back: "BECAUSE a syntax error in sshd_config will prevent the SSH daemon from starting, running sshd -t catches errors before the restart. THEREFORE you avoid accidentally locking yourself out of the server."
    tags: ["ssh"]
    difficulty: "intermediate"
    why: "Connects config validation to the risk of lockout."

  - id: "ch11-08-networking-ssh-remote-access-025"
    front: "What is ufw's default policy for incoming traffic once enabled?"
    back: "Deny all incoming traffic unless explicitly allowed."
    tags: ["ufw"]
    difficulty: "intermediate"

  - id: "ch11-08-networking-ssh-remote-access-026"
    front: "Why must you allow port 22 before enabling ufw?"
    back: "BECAUSE ufw's default policy denies all incoming traffic, enabling it without allowing port 22 immediately blocks SSH. THEREFORE you would lose remote access to the server with no way to reconnect except through a provider's console."
    tags: ["ufw", "security"]
    difficulty: "advanced"
    why: "Tests understanding of the consequences of default-deny on active connections."

  - id: "ch11-08-networking-ssh-remote-access-027"
    front: "What command allows TCP traffic on port 8000 through ufw?"
    back: "sudo ufw allow 8000/tcp"
    tags: ["ufw"]
    difficulty: "basic"

  - id: "ch11-08-networking-ssh-remote-access-028"
    front: "What command shows numbered ufw rules?"
    back: "sudo ufw status numbered"
    tags: ["ufw"]
    difficulty: "basic"

  - id: "ch11-08-networking-ssh-remote-access-029"
    front: "Why is it important to remove unused ufw allow rules when decommissioning a service?"
    back: "BECAUSE each allowed port is an entry point for attackers, leaving rules for services that no longer run creates unnecessary exposure. THEREFORE removing rules with 'ufw delete allow PORT/tcp' maintains the default-deny posture."
    tags: ["ufw"]
    difficulty: "intermediate"
    why: "Connects rule hygiene to the ongoing security of the server."

  - id: "ch11-08-networking-ssh-remote-access-030"
    front: "Why does ufw use a default-deny policy instead of default-allow for incoming traffic?"
    back: "BECAUSE default-deny blocks everything not explicitly permitted, only the ports you consciously open are exposed. THEREFORE any new service or forgotten port is automatically protected, making security the default rather than an afterthought."
    tags: ["ufw", "security"]
    difficulty: "advanced"
    why: "Connects the default-deny model to the principle of least exposure."

  - id: "ch11-08-networking-ssh-remote-access-031"
    front: "Why does the agent diagnostic checklist start from the service and work outward?"
    back: "BECAUSE most problems are at the service layer (not running or wrong binding), checking inside-out eliminates the most likely causes first. THEREFORE you avoid wasting time on network-level debugging when the process itself is the issue."
    tags: ["diagnostics"]
    difficulty: "advanced"
    why: "Tests understanding of inside-out diagnostic methodology."
