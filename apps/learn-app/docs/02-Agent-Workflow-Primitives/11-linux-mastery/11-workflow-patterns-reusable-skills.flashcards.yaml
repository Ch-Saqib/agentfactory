deck:
  id: "ch11-11-workflow-patterns-reusable-skills"
  title: "Workflow Patterns & Reusable Skills"
  description: "Deployment patterns (restart, blue-green, rolling), monitoring integration (logrotate, disk alerts, cron), and packaging operational expertise into reusable SKILL.md files."
  tags: ["deployment-patterns", "blue-green", "monitoring", "logrotate", "cron", "reusable-skills", "SKILL.md", "linux-ops"]
  version: 1

cards:
  - id: "ch11-11-workflow-patterns-reusable-skills-001"
    front: "What are the three deployment patterns compared in this lesson?"
    back: "Simple restart\nBlue-green deployment\nRolling deployment"
    tags: ["deployment-patterns"]
    difficulty: "basic"

  - id: "ch11-11-workflow-patterns-reusable-skills-002"
    front: "In blue-green deployment, what are the two service instances called and what ports do they use?"
    back: "Blue on port 8000\nGreen on port 8001"
    tags: ["blue-green"]
    difficulty: "basic"

  - id: "ch11-11-workflow-patterns-reusable-skills-003"
    front: "What file tracks which color instance is currently live in a blue-green deployment?"
    back: "/opt/agent-active-color"
    tags: ["blue-green"]
    difficulty: "basic"

  - id: "ch11-11-workflow-patterns-reusable-skills-004"
    front: "Why does logrotate use 'delaycompress' instead of compressing immediately?"
    back: "BECAUSE the most recently rotated log file is the one you are most likely to inspect, THEREFORE delaying compression by one cycle keeps it as readable plain text while still compressing older files."
    tags: ["logrotate", "monitoring"]
    difficulty: "intermediate"
    why: "Balances storage efficiency with operational debugging convenience"

  - id: "ch11-11-workflow-patterns-reusable-skills-005"
    front: "What logrotate flag runs a dry run without actually rotating logs?"
    back: "The -d flag"
    tags: ["logrotate"]
    difficulty: "basic"

  - id: "ch11-11-workflow-patterns-reusable-skills-006"
    front: "What are the three sections in a SKILL.md body after the YAML frontmatter?"
    back: "Persona\nQuestions\nPrinciples"
    tags: ["reusable-skills", "SKILL.md"]
    difficulty: "basic"

  - id: "ch11-11-workflow-patterns-reusable-skills-007"
    front: "What two fields are required in the YAML frontmatter of a SKILL.md file?"
    back: "name and description"
    tags: ["reusable-skills", "SKILL.md"]
    difficulty: "basic"

  - id: "ch11-11-workflow-patterns-reusable-skills-008"
    front: "What cron expression schedules a job to run every 5 minutes?"
    back: "*/5 * * * *"
    tags: ["cron", "monitoring"]
    difficulty: "intermediate"

  - id: "ch11-11-workflow-patterns-reusable-skills-009"
    front: "What three criteria determine whether a recurring pattern is worth formalizing into a skill?"
    back: "Frequency (recurs 2+ times)\nComplexity (over 3 steps)\nValue (saves time/prevents bugs)"
    tags: ["reusable-skills"]
    difficulty: "intermediate"

  - id: "ch11-11-workflow-patterns-reusable-skills-010"
    front: "Why is blue-green deployment recommended over simple restart for single-server production agents?"
    back: "BECAUSE blue-green achieves near-zero downtime by deploying to the idle instance and switching traffic only after health checks pass, THEREFORE users never see an outage during updates."
    tags: ["blue-green", "deployment-patterns"]
    difficulty: "intermediate"
    why: "Connects deployment strategy choice to user-facing availability guarantees"

  - id: "ch11-11-workflow-patterns-reusable-skills-011"
    front: "Why should deployment scripts include prerequisite checks at the top?"
    back: "BECAUSE scripts may silently depend on accumulated server state (installed packages, existing users), THEREFORE checking prerequisites upfront turns mysterious mid-deployment failures into immediate, clear errors."
    tags: ["deployment-patterns", "fresh-system"]
    difficulty: "intermediate"
    why: "Relates portability to explicit dependency declaration"

  - id: "ch11-11-workflow-patterns-reusable-skills-012"
    front: "Why does the blue-green deploy script health-check the new instance before switching traffic?"
    back: "BECAUSE a failed deployment should never reach users, THEREFORE health-gating ensures only verified instances receive traffic, and failures trigger automatic rollback of the target instance."
    tags: ["blue-green"]
    difficulty: "intermediate"
    why: "Links verification-before-cutover to production safety"

  - id: "ch11-11-workflow-patterns-reusable-skills-013"
    front: "Why is copying deployment scripts between projects a liability?"
    back: "BECAUSE each copy diverges with different values and new bugs, THEREFORE one authoritative version with parameterized defaults prevents inconsistency and reduces maintenance burden."
    tags: ["reusable-skills"]
    difficulty: "intermediate"
    why: "Explains the DRY principle applied to operational scripts"

  - id: "ch11-11-workflow-patterns-reusable-skills-014"
    front: "How does the 'Questions' section of a SKILL.md enable reuse across different projects?"
    back: "BECAUSE each question captures a decision that varies between deployments with a sensible default, THEREFORE an AI agent only overrides what differs, making the skill fast and adaptable without rewriting."
    tags: ["reusable-skills", "SKILL.md"]
    difficulty: "advanced"
    why: "Connects parameterized defaults to skill portability"

  - id: "ch11-11-workflow-patterns-reusable-skills-015"
    front: "Why is fresh-system testing the most important validation step for reusable skills?"
    back: "BECAUSE development servers accumulate hidden state (pre-installed packages, existing users, directories), THEREFORE testing on a clean system exposes silent assumptions that would break portability in production."
    tags: ["fresh-system", "reusable-skills"]
    difficulty: "advanced"
    why: "Reveals how accumulated state masks broken assumptions"

  - id: "ch11-11-workflow-patterns-reusable-skills-016"
    front: "Why is simple restart deployment unsuitable for production agents serving paying customers?"
    back: "BECAUSE simple restart stops the old version before starting the new one, THEREFORE all requests fail during the gap, causing user-visible downtime that erodes trust and revenue."
    tags: ["deployment-patterns"]
    difficulty: "intermediate"
    why: "Connects deployment mechanics to business impact"

  - id: "ch11-11-workflow-patterns-reusable-skills-017"
    front: "What does the logrotate directive 'rotate 4' combined with 'weekly' achieve?"
    back: "Keeps 4 weeks of rotated log history."
    tags: ["logrotate", "monitoring"]
    difficulty: "basic"

  - id: "ch11-11-workflow-patterns-reusable-skills-018"
    front: "What is the default disk usage threshold in the check-disk-space.sh script?"
    back: "80 percent"
    tags: ["monitoring", "disk-alerts"]
    difficulty: "basic"

  - id: "ch11-11-workflow-patterns-reusable-skills-019"
    front: "How does rolling deployment differ from blue-green in infrastructure requirements?"
    back: "BECAUSE rolling updates instances one at a time across a fleet, THEREFORE it requires multiple instances and a load balancer, while blue-green needs only two instances on one server."
    tags: ["deployment-patterns"]
    difficulty: "intermediate"
    why: "Contrasts infrastructure demands of two zero-downtime strategies"

  - id: "ch11-11-workflow-patterns-reusable-skills-020"
    front: "Why does the lesson defer Docker in favor of systemd for single-server deployments?"
    back: "BECAUSE systemd runs agents directly on the host with zero overhead and provides service management, restart policies, resource limits, and logging, THEREFORE Docker's container abstraction adds unnecessary complexity for single-server setups."
    tags: ["deployment-patterns"]
    difficulty: "advanced"
    why: "Evaluates when abstraction layers add value versus overhead"

  - id: "ch11-11-workflow-patterns-reusable-skills-021"
    front: "What six steps does the full-deploy.sh script execute in order?"
    back: "Check/create user\nDeploy code\nInstall systemd service\nStart service\nHealth check\nVerify final state"
    tags: ["deployment-patterns"]
    difficulty: "intermediate"

  - id: "ch11-11-workflow-patterns-reusable-skills-022"
    front: "Why does the Persona section of a SKILL.md matter for AI agent execution?"
    back: "BECAUSE the persona defines the expertise level and operational mindset, THEREFORE an AI agent adopts the correct safety posture and decision-making framework when executing the skill autonomously."
    tags: ["reusable-skills", "SKILL.md"]
    difficulty: "advanced"
    why: "Links persona framing to reliable autonomous execution"

  - id: "ch11-11-workflow-patterns-reusable-skills-023"
    front: "What bash command checks whether a required tool is installed before proceeding?"
    back: "command -v <tool-name> &>/dev/null"
    tags: ["deployment-patterns", "fresh-system"]
    difficulty: "intermediate"

  - id: "ch11-11-workflow-patterns-reusable-skills-024"
    front: "How many commands are needed to rollback a blue-green deployment?"
    back: "Three commands plus one routing change (start old, stop new, update active-color file, switch proxy)."
    tags: ["blue-green"]
    difficulty: "intermediate"

  - id: "ch11-11-workflow-patterns-reusable-skills-025"
    front: "Why must the Principles section encode hard-won lessons as rules rather than suggestions?"
    back: "BECAUSE principles prevent entire classes of errors permanently, THEREFORE encoding them as firm rules ensures AI agents and humans never repeat past mistakes regardless of who executes the skill."
    tags: ["reusable-skills", "SKILL.md"]
    difficulty: "advanced"
    why: "Distinguishes enforced constraints from optional guidance"

  - id: "ch11-11-workflow-patterns-reusable-skills-026"
    front: "Why is a postrotate directive needed in logrotate configuration for running services?"
    back: "BECAUSE the service holds an open file handle to the old log file, THEREFORE postrotate signals the service to reopen its log files so new entries write to the freshly created log instead of the rotated one."
    tags: ["logrotate", "monitoring"]
    difficulty: "advanced"
    why: "Links file handle mechanics to correct log rotation behavior"
