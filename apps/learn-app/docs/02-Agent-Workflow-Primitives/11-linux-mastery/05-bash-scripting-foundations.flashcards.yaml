deck:
  id: "ch11-05-bash-scripting-foundations"
  title: "Bash Scripting Foundations"
  description: "Variables, error handling with set -euo pipefail, functions, conditionals, and loops for automating agent deployment tasks."
  tags: ["bash", "scripting", "error-handling", "automation", "linux"]
  version: 1

cards:
  - id: "ch11-05-bash-scripting-foundations-001"
    front: "What does the shebang line #!/bin/bash do at the top of a script?"
    back: "It tells the system which interpreter to use to run the file."
    tags: ["shebang", "script-execution"]
    difficulty: "basic"

  - id: "ch11-05-bash-scripting-foundations-002"
    front: "What command grants executable permission to a script file?"
    back: "chmod +x filename.sh"
    tags: ["permissions", "script-execution"]
    difficulty: "basic"

  - id: "ch11-05-bash-scripting-foundations-003"
    front: "What does $(date) do inside a bash script string?"
    back: "Command substitution: captures the output of date and inserts it into the string."
    tags: ["command-substitution", "variables"]
    difficulty: "basic"

  - id: "ch11-05-bash-scripting-foundations-004"
    front: "What does the set -e flag do in a bash script?"
    back: "Stops the script immediately when any command fails."
    tags: ["error-handling", "set-flags"]
    difficulty: "basic"

  - id: "ch11-05-bash-scripting-foundations-005"
    front: "What does the set -u flag prevent in a bash script?"
    back: "Using undefined variables, which would otherwise expand to empty strings silently."
    tags: ["error-handling", "set-flags"]
    difficulty: "basic"

  - id: "ch11-05-bash-scripting-foundations-006"
    front: "Why is set -o pipefail needed in addition to set -e?"
    back: "BECAUSE set -e only checks the final command in a pipeline. THEREFORE a failing command piped to a succeeding one silently masks the failure without pipefail."
    tags: ["error-handling", "set-flags"]
    difficulty: "intermediate"
    why: "Exposes the pipeline exit-code behavior that set -e alone cannot catch."

  - id: "ch11-05-bash-scripting-foundations-007"
    front: "Why does ${AGENT_NAME}log produce different results than $AGENT_NAMElog?"
    back: "BECAUSE bash parses $AGENT_NAMElog as a single variable name AGENT_NAMElog (which is undefined). THEREFORE curly braces in ${AGENT_NAME}log explicitly delimit the variable name from the trailing text."
    tags: ["variables", "quoting"]
    difficulty: "intermediate"
    why: "Shows how bash's greedy variable name parsing creates subtle concatenation bugs."

  - id: "ch11-05-bash-scripting-foundations-008"
    front: "What does the local keyword do inside a bash function?"
    back: "Restricts the variable's scope to that function only."
    tags: ["functions", "variables"]
    difficulty: "basic"

  - id: "ch11-05-bash-scripting-foundations-009"
    front: "How do bash functions receive arguments?"
    back: "Positionally: $1 is the first argument, $2 the second, and so on."
    tags: ["functions", "arguments"]
    difficulty: "basic"

  - id: "ch11-05-bash-scripting-foundations-010"
    front: "What does the test [[ -d path ]] check?"
    back: "Whether a directory exists at that path."
    tags: ["conditionals", "test-operators"]
    difficulty: "basic"

  - id: "ch11-05-bash-scripting-foundations-011"
    front: "What does the test [[ -f path ]] check?"
    back: "Whether a regular file exists at that path."
    tags: ["conditionals", "test-operators"]
    difficulty: "basic"

  - id: "ch11-05-bash-scripting-foundations-012"
    front: "Why would you use [[ -z \"${VAR}\" ]] before running a deployment command?"
    back: "BECAUSE -z tests whether the variable is empty. THEREFORE checking before use prevents deploying with a blank agent name or path, which could target wrong directories."
    tags: ["conditionals", "test-operators"]
    difficulty: "intermediate"
    why: "Connects the empty-string test to defensive scripting in real deployments."

  - id: "ch11-05-bash-scripting-foundations-013"
    front: "In a bash array AGENTS=(\"a\" \"b\" \"c\"), what does ${AGENTS[@]} expand to?"
    back: "All elements of the array, each properly quoted."
    tags: ["arrays", "loops"]
    difficulty: "intermediate"

  - id: "ch11-05-bash-scripting-foundations-014"
    front: "How do you get the count of elements in a bash array called AGENTS?"
    back: "${#AGENTS[@]}"
    tags: ["arrays", "loops"]
    difficulty: "intermediate"

  - id: "ch11-05-bash-scripting-foundations-015"
    front: "Why do bash scripts continue running after a command fails by default?"
    back: "BECAUSE bash's default behavior is to execute every line regardless of exit status. THEREFORE without set -e, a failed cd followed by rm -rf executes the rm in the wrong directory."
    tags: ["error-handling", "set-flags"]
    difficulty: "intermediate"
    why: "Connects default bash behavior to real deployment dangers."

  - id: "ch11-05-bash-scripting-foundations-016"
    front: "Why must variable expansions be wrapped in double quotes?"
    back: "BECAUSE unquoted variables undergo word splitting on spaces. THEREFORE a path like /tmp/my agent becomes two separate arguments /tmp/my and agent, breaking the command."
    tags: ["variables", "quoting"]
    difficulty: "intermediate"
    why: "Links quoting rules to the word-splitting mechanism that causes bugs."

  - id: "ch11-05-bash-scripting-foundations-017"
    front: "Why are idempotent scripts important for deployment automation?"
    back: "BECAUSE deployments can fail midway and need re-running. THEREFORE scripts that check what exists before creating avoid duplicate resources and partial-state errors on retry."
    tags: ["idempotency", "deployment"]
    difficulty: "intermediate"
    why: "Explains the production requirement behind check-before-create patterns."

  - id: "ch11-05-bash-scripting-foundations-018"
    front: "How could set -u prevent rm -rf ${TYPO_VAR}/ from deleting the root filesystem?"
    back: "BECAUSE an undefined TYPO_VAR expands to empty string, making the command rm -rf /. THEREFORE set -u catches the undefined variable and halts the script before the rm executes."
    tags: ["error-handling", "set-flags"]
    difficulty: "advanced"
    why: "Demonstrates how a single typo escalates into catastrophic data loss."

  - id: "ch11-05-bash-scripting-foundations-019"
    front: "Why should bash functions declare variables with local instead of using global scope?"
    back: "BECAUSE without local, variables leak into and overwrite the global scope. THEREFORE a function that sets name=\"test\" could silently corrupt a global name variable used elsewhere in the script."
    tags: ["functions", "variables"]
    difficulty: "intermediate"
    why: "Reveals the scoping bug that emerges as scripts grow beyond trivial size."

  - id: "ch11-05-bash-scripting-foundations-020"
    front: "How does scripted deployment compare to manual for a 12-agent, 3-server setup?"
    back: "Manual: 36 steps, 2 engineers, ~1 hour, slightly different every time with silent failures. Scripted: 1 command, 0 engineers, ~5 minutes, identical every time with explicit errors."
    tags: ["deployment", "automation"]
    difficulty: "intermediate"
    why: "Quantifies the reliability and efficiency gap between manual and automated deploys."

  - id: "ch11-05-bash-scripting-foundations-021"
    front: "Why does a script without a shebang line fail to execute directly?"
    back: "BECAUSE the operating system needs the #! line to identify which interpreter should run the file. THEREFORE without it, the system treats the file as plain text rather than an executable script."
    tags: ["shebang", "script-execution"]
    difficulty: "intermediate"
    why: "Connects the OS file execution mechanism to the practical permission-denied error."

  - id: "ch11-05-bash-scripting-foundations-022"
    front: "Why use ${1:-customer-support} instead of just $1 for a script argument?"
    back: "BECAUSE $1 is empty when no argument is provided, which could break later commands. THEREFORE the :- syntax supplies a safe default value, making the script usable with or without arguments."
    tags: ["variables", "arguments"]
    difficulty: "intermediate"
    why: "Shows how default values make scripts robust against missing input."

  - id: "ch11-05-bash-scripting-foundations-023"
    front: "Why send error messages to stderr with >&2 instead of stdout?"
    back: "BECAUSE stdout carries normal output that other commands may pipe or capture. THEREFORE sending errors to stderr keeps them visible to the user while allowing stdout to be processed cleanly by downstream commands."
    tags: ["functions", "error-handling"]
    difficulty: "intermediate"
    why: "Explains the stdout/stderr separation that enables reliable command piping."

  - id: "ch11-05-bash-scripting-foundations-024"
    front: "What does the syntax AGENTS=(\"a\" \"b\" \"c\") declare in bash?"
    back: "An array with three string elements."
    tags: ["arrays", "loops"]
    difficulty: "basic"

  - id: "ch11-05-bash-scripting-foundations-025"
    front: "Why is the check-before-create pattern a production requirement for scripts?"
    back: "BECAUSE production scripts run repeatedly during retries and maintenance. THEREFORE checking if resources exist before creating them makes scripts idempotent, safe to re-run without side effects or duplicate errors."
    tags: ["idempotency", "deployment"]
    difficulty: "advanced"
    why: "Ties idempotency to the operational reality of production failure recovery."

  - id: "ch11-05-bash-scripting-foundations-026"
    front: "What does return 1 do inside a bash function?"
    back: "Exits the function with an error status (non-zero means failure)."
    tags: ["functions", "error-handling"]
    difficulty: "basic"
