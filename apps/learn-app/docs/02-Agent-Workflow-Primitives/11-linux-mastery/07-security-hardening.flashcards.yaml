deck:
  id: "ch11-07-security-hardening"
  title: "Security Hardening & Least Privilege"
  description: "Dedicated service users, chmod/chown file permissions, environment variable scoping, SSH key generation, and .env secret management following the principle of least privilege."
  tags: ["security", "least-privilege", "chmod", "chown", "useradd", "permissions", "environment-variables", "ssh", "env-files", "secrets"]
  version: 1

cards:
  - id: "ch11-07-security-hardening-001"
    front: "What does the principle of least privilege mean for agent deployment?"
    back: "Each agent gets only the minimum permissions it needs to function — no more."
    tags: ["least-privilege"]
    difficulty: "basic"

  - id: "ch11-07-security-hardening-002"
    front: "Why should AI agents never run as root in production?"
    back: "BECAUSE root has unrestricted access to every file, process, and resource on the system, a compromised root-level agent exposes the entire server. THEREFORE dedicated non-root users limit the blast radius of any breach."
    tags: ["root", "least-privilege"]
    difficulty: "intermediate"
    why: "Connects root privileges to real-world blast radius of security incidents"

  - id: "ch11-07-security-hardening-003"
    front: "What command creates a system user with no login shell for running an agent?"
    back: "sudo useradd --system --shell /usr/sbin/nologin --create-home agent-runner"
    tags: ["useradd", "service-user"]
    difficulty: "basic"

  - id: "ch11-07-security-hardening-004"
    front: "What does the --system flag do in useradd?"
    back: "Creates a system account with a UID below 1000, hidden from the login screen."
    tags: ["useradd"]
    difficulty: "basic"

  - id: "ch11-07-security-hardening-005"
    front: "Why is /usr/sbin/nologin used as the shell for service users?"
    back: "BECAUSE nologin blocks interactive terminal sessions, even if an attacker obtains the user's credentials they cannot open a shell. THEREFORE it eliminates remote login as an attack vector."
    tags: ["nologin", "service-user"]
    difficulty: "intermediate"
    why: "Links shell restriction to a specific attack prevention mechanism"

  - id: "ch11-07-security-hardening-006"
    front: "What are the three permission sets on every Linux file?"
    back: "Owner\nGroup\nOthers"
    tags: ["permissions"]
    difficulty: "basic"

  - id: "ch11-07-security-hardening-007"
    front: "What numeric values correspond to read, write, and execute permissions?"
    back: "Read = 4\nWrite = 2\nExecute = 1"
    tags: ["chmod", "permissions"]
    difficulty: "basic"

  - id: "ch11-07-security-hardening-008"
    front: "What does chmod 600 mean in terms of access?"
    back: "Owner can read and write. Group and others have no access."
    tags: ["chmod", "permissions"]
    difficulty: "basic"

  - id: "ch11-07-security-hardening-009"
    front: "Why is chmod 700 recommended for agent scripts instead of 755?"
    back: "BECAUSE 755 grants read and execute to group and others, any user on the system could run the script. THEREFORE 700 restricts execution to the owner only, preventing unauthorized users from launching the agent."
    tags: ["chmod", "agent-deployment"]
    difficulty: "intermediate"
    why: "Tests understanding of the security difference between common permission values"

  - id: "ch11-07-security-hardening-010"
    front: "What chmod value should .env files have and why?"
    back: "BECAUSE .env files contain secrets like API keys, they must be readable only by their owner. THEREFORE chmod 600 is required — any broader permission risks exposing credentials to other users."
    tags: ["env-files", "chmod"]
    difficulty: "intermediate"
    why: "Connects permission value to the specific threat of credential exposure"

  - id: "ch11-07-security-hardening-011"
    front: "What does the chown -R flag do?"
    back: "Applies ownership changes recursively to all files and subdirectories."
    tags: ["chown"]
    difficulty: "basic"

  - id: "ch11-07-security-hardening-012"
    front: "Why would you choose symbolic chmod notation over numeric?"
    back: "BECAUSE symbolic notation (e.g., g+r) modifies only the targeted bit without resetting other permissions, it is safer when adding or removing a single permission. THEREFORE use symbolic for targeted tweaks and numeric when setting all permissions from scratch."
    tags: ["chmod", "permissions"]
    difficulty: "intermediate"
    why: "Tests when each chmod style is appropriate rather than just what they are"

  - id: "ch11-07-security-hardening-013"
    front: "What two files does ssh-keygen -t ed25519 create?"
    back: "~/.ssh/id_ed25519 (private key)\n~/.ssh/id_ed25519.pub (public key)"
    tags: ["ssh", "keys"]
    difficulty: "basic"

  - id: "ch11-07-security-hardening-014"
    front: "Why does SSH refuse to use a private key with overly permissive file permissions?"
    back: "BECAUSE a private key readable by others could be stolen by any user on the system, SSH enforces 600 permissions as a safeguard. THEREFORE it refuses to authenticate rather than risk using a compromised key."
    tags: ["ssh", "permissions"]
    difficulty: "advanced"
    why: "Explains why SSH has a built-in permissions check as a security mechanism"

  - id: "ch11-07-security-hardening-015"
    front: "Why do private and public SSH keys need different chmod values?"
    back: "BECAUSE the private key authenticates your identity while the public key is designed to be shared, the private key needs 600 (owner-only) while the public key can be 644. THEREFORE applying the same restrictive permissions to both would prevent servers from reading the public key."
    tags: ["ssh", "chmod"]
    difficulty: "intermediate"
    why: "Connects the asymmetric nature of key pairs to their permission requirements"

  - id: "ch11-07-security-hardening-016"
    front: "What happens when a non-exported variable is accessed in a subshell?"
    back: "The subshell sees an empty value — non-exported variables do not propagate to child processes."
    tags: ["environment-variables", "export"]
    difficulty: "basic"

  - id: "ch11-07-security-hardening-017"
    front: "Why is forgetting to export an API key the most common cause of agent startup failures?"
    back: "BECAUSE agent scripts run in subshells (child processes), only exported variables are inherited. THEREFORE a non-exported API key is invisible to the agent, causing authentication errors that appear unrelated to variable scoping."
    tags: ["export", "agent-deployment"]
    difficulty: "advanced"
    why: "Links variable scoping to a specific, frequent production debugging scenario"

  - id: "ch11-07-security-hardening-018"
    front: "Why does sudo strip environment variables by default?"
    back: "BECAUSE inherited variables could contain malicious values that alter program behavior (like LD_PRELOAD or PATH hijacking), sudo sanitizes the environment. THEREFORE you must explicitly opt in with --preserve-env=VAR_NAME for each variable an agent needs."
    tags: ["sudo", "environment-variables"]
    difficulty: "advanced"
    why: "Reveals the security rationale behind sudo's environment stripping behavior"

  - id: "ch11-07-security-hardening-019"
    front: "How do you pass a specific environment variable through sudo to an agent process?"
    back: "sudo --preserve-env=VAR_NAME command"
    tags: ["sudo", "environment-variables"]
    difficulty: "intermediate"

  - id: "ch11-07-security-hardening-020"
    front: "Why should you never use sudo --preserve-env without specifying variable names?"
    back: "BECAUSE it passes all shell state through, including potentially sensitive variables unrelated to the agent. THEREFORE always specify exact variable names to preserve the principle of least privilege for environment data."
    tags: ["sudo", "least-privilege"]
    difficulty: "advanced"
    why: "Applies least privilege to environment variable passing, not just file permissions"

  - id: "ch11-07-security-hardening-021"
    front: "What command locks down a .env file so only its owner can read it?"
    back: "chmod 600 /path/to/.env"
    tags: ["env-files", "chmod"]
    difficulty: "basic"

  - id: "ch11-07-security-hardening-022"
    front: "What does the source command do with a .env file?"
    back: "Reads the file and executes each line in the current shell, making the variables available."
    tags: ["env-files", "source"]
    difficulty: "basic"

  - id: "ch11-07-security-hardening-023"
    front: "Why is the set -a / source / set +a pattern used for .env files?"
    back: "BECAUSE source alone loads variables into the current shell but does not export them, child processes like Python agents cannot see them. THEREFORE set -a before sourcing auto-exports all defined variables, and set +a stops exporting subsequent ones."
    tags: ["env-files", "export"]
    difficulty: "intermediate"
    why: "Explains why sourcing alone is insufficient for agent deployment scripts"

  - id: "ch11-07-security-hardening-024"
    front: "Why is removing a committed .env file from git history insufficient after a leak?"
    back: "BECAUSE the keys may already be cached, forked, or scraped by automated bots before removal, the secrets should be considered compromised. THEREFORE you must rotate all exposed credentials immediately rather than relying on history cleanup."
    tags: ["env-files", "secrets", "git"]
    difficulty: "advanced"
    why: "Challenges the misconception that git history rewriting fixes secret leaks"

  - id: "ch11-07-security-hardening-025"
    front: "What three steps make up the .env security workflow?"
    back: "1. Create the .env file\n2. chmod 600 the file\n3. Add .env to .gitignore"
    tags: ["env-files", "workflow"]
    difficulty: "intermediate"

  - id: "ch11-07-security-hardening-026"
    front: "Why does .env-based secret management simplify API key rotation compared to hardcoded keys?"
    back: "BECAUSE secrets live in a single file outside the codebase, rotation requires only editing the .env and restarting the agent. THEREFORE there is no code change, commit, build, or deploy cycle needed."
    tags: ["env-files", "secrets", "rotation"]
    difficulty: "intermediate"
    why: "Contrasts operational simplicity of .env files against hardcoded secret management"
