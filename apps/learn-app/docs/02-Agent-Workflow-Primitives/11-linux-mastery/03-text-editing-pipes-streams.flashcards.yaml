deck:
  id: "ch11-03-text-editing-pipes-streams"
  title: "Text Editing, Pipes & I/O Streams"
  description: "Master nano editor shortcuts, Unix pipes for chaining commands, and I/O stream redirection for controlling where output and errors go."
  tags: ["nano", "pipes", "stdin", "stdout", "stderr", "redirection", "unix-philosophy", "linux"]
  version: 1

cards:
  - id: "ch11-03-text-editing-pipes-streams-001"
    front: "In nano, what keyboard shortcut saves the current file?"
    back: "Ctrl+O (Write Out)"
    tags: ["nano"]
    difficulty: "basic"

  - id: "ch11-03-text-editing-pipes-streams-002"
    front: "In nano, what keyboard shortcut exits the editor?"
    back: "Ctrl+X exits the editor."
    tags: ["nano"]
    difficulty: "basic"

  - id: "ch11-03-text-editing-pipes-streams-003"
    front: "What are the three I/O streams every Linux command has, and their stream numbers?"
    back: "stdin (0) — input\nstdout (1) — normal output\nstderr (2) — error messages"
    tags: ["io-streams"]
    difficulty: "basic"

  - id: "ch11-03-text-editing-pipes-streams-004"
    front: "What does the pipe operator | connect between two commands?"
    back: "stdout of the first command to stdin of the next command"
    tags: ["pipes"]
    difficulty: "basic"

  - id: "ch11-03-text-editing-pipes-streams-005"
    front: "What is the difference between > and >> in Linux redirection?"
    back: "> overwrites the file\n>> appends to the end of the file"
    tags: ["redirection"]
    difficulty: "basic"

  - id: "ch11-03-text-editing-pipes-streams-006"
    front: "What redirection operator sends stderr to a file?"
    back: "2> redirects stderr to a file."
    tags: ["redirection", "stderr"]
    difficulty: "intermediate"

  - id: "ch11-03-text-editing-pipes-streams-007"
    front: "Why does 2>&1 use an ampersand before the 1?"
    back: "BECAUSE without the ampersand, the shell would interpret 1 as a filename. The & tells the shell that 1 refers to file descriptor 1 (stdout), not a file called '1'."
    tags: ["redirection", "stderr"]
    difficulty: "intermediate"
    why: "The ampersand syntax prevents a common mistake of creating a file named 1"

  - id: "ch11-03-text-editing-pipes-streams-008"
    front: "What is /dev/null used for in Linux?"
    back: "Discarding unwanted output — it is the system's black hole"
    tags: ["redirection"]
    difficulty: "intermediate"

  - id: "ch11-03-text-editing-pipes-streams-009"
    front: "In nano, what does the ^ symbol represent in the shortcut bar?"
    back: "The Ctrl key"
    tags: ["nano"]
    difficulty: "basic"

  - id: "ch11-03-text-editing-pipes-streams-010"
    front: "What command shows the full manual page for a Linux command?"
    back: "man (e.g., man ls)"
    tags: ["self-help"]
    difficulty: "basic"

  - id: "ch11-03-text-editing-pipes-streams-011"
    front: "Why do both stdout and stderr appear the same on screen even though they are separate streams?"
    back: "BECAUSE both streams default to the screen as their destination. THEREFORE they look identical until you redirect one of them to a file, which proves they are independent channels."
    tags: ["io-streams"]
    difficulty: "intermediate"
    why: "Understanding stream separation is key to production log management"

  - id: "ch11-03-text-editing-pipes-streams-012"
    front: "Why should production agents use >> instead of > for log files?"
    back: "BECAUSE > overwrites the file, destroying previous entries. THEREFORE production systems use >> to append new log entries, preserving the full history needed for debugging."
    tags: ["redirection", "production"]
    difficulty: "intermediate"
    why: "Choosing the wrong operator causes irreversible data loss in logs"

  - id: "ch11-03-text-editing-pipes-streams-013"
    front: "Why does a pipe not pass stderr from one command to the next?"
    back: "BECAUSE pipes only connect stdout to stdin. THEREFORE stderr bypasses the pipe entirely and still displays on screen, unless explicitly redirected before piping."
    tags: ["pipes", "stderr"]
    difficulty: "advanced"
    why: "This misconception causes missed errors in multi-command pipelines"

  - id: "ch11-03-text-editing-pipes-streams-014"
    front: "How does the Unix philosophy relate to the pipe operator?"
    back: "BECAUSE the Unix philosophy says each tool should do one thing well, pipes let you compose small specialized tools into powerful workflows. THEREFORE a one-line pipeline can replace an entire script."
    tags: ["unix-philosophy", "pipes"]
    difficulty: "intermediate"
    why: "Pipes are the mechanism that makes small-tool composition practical"

  - id: "ch11-03-text-editing-pipes-streams-015"
    front: "Why is separating stdout and stderr into different files useful for monitoring production agents?"
    back: "BECAUSE errors and normal output serve different purposes, separating them lets you monitor error logs independently without sifting through routine activity. THEREFORE you catch failures faster."
    tags: ["stderr", "production"]
    difficulty: "intermediate"
    why: "Mixed logs hide critical errors inside volumes of normal output"

  - id: "ch11-03-text-editing-pipes-streams-016"
    front: "What nano shortcut searches for text within a file?"
    back: "Ctrl+W opens the search prompt."
    tags: ["nano"]
    difficulty: "basic"

  - id: "ch11-03-text-editing-pipes-streams-017"
    front: "What command gives a quick summary of a command's options without opening the full manual?"
    back: "command --help (e.g., ls --help)"
    tags: ["self-help"]
    difficulty: "intermediate"

  - id: "ch11-03-text-editing-pipes-streams-018"
    front: "How would you find the 5 largest items in a directory using a pipeline?"
    back: "du -sh * | sort -rh | head -5\ndu shows sizes, sort orders largest first, head takes top 5"
    tags: ["pipes"]
    difficulty: "intermediate"
    why: "Multi-stage pipelines demonstrate composing simple tools into complex analysis"

  - id: "ch11-03-text-editing-pipes-streams-019"
    front: "If you run python3 agent.py > output.log 2>&1, where do stdout and stderr go?"
    back: "BECAUSE > sends stdout to output.log and 2>&1 redirects stderr to the same destination as stdout, both streams end up captured in output.log with nothing displayed on screen."
    tags: ["redirection", "production"]
    difficulty: "advanced"
    why: "This is the standard production pattern for capturing all agent output"

  - id: "ch11-03-text-editing-pipes-streams-020"
    front: "Why does the opening scenario use tail before grep instead of grep on the entire 2.3GB log?"
    back: "BECAUSE tail -n 1000 reads only the last 1000 lines, avoiding the need to scan 2.3GB. THEREFORE the pipeline returns results in two seconds instead of flooding the terminal for twenty seconds."
    tags: ["pipes"]
    difficulty: "advanced"
    why: "Choosing what to feed into a pipe determines both speed and usefulness"

  - id: "ch11-03-text-editing-pipes-streams-021"
    front: "Why should you reach for man or --help before searching the web?"
    back: "BECAUSE the documentation is already installed on your system, it is faster and always matches your exact installed version. THEREFORE you get accurate answers without leaving the terminal."
    tags: ["self-help"]
    difficulty: "intermediate"
    why: "Web results may not match the version of the tool on your system"

  - id: "ch11-03-text-editing-pipes-streams-022"
    front: "Why is nano recommended as the safe default editor for remote servers?"
    back: "BECAUSE nano uses simple Ctrl-key shortcuts visible on screen, so you cannot get trapped in an unfamiliar modal interface. THEREFORE it is the lowest-risk editor for emergency production config changes."
    tags: ["nano", "production"]
    difficulty: "intermediate"
    why: "Getting stuck in an editor on a production server wastes critical incident response time"

  - id: "ch11-03-text-editing-pipes-streams-023"
    front: "What happens if you use > to redirect to a file that already has content?"
    back: "BECAUSE > overwrites rather than appends, the existing content is completely erased and replaced with the new output. THEREFORE always use >> when preserving previous data matters."
    tags: ["redirection"]
    difficulty: "advanced"
    why: "Confusing > with >> is a common cause of accidental data loss"

  - id: "ch11-03-text-editing-pipes-streams-024"
    front: "What default destination does stdin read from when no redirection is applied?"
    back: "The keyboard"
    tags: ["io-streams"]
    difficulty: "basic"

  - id: "ch11-03-text-editing-pipes-streams-025"
    front: "How does find /etc -name '*.conf' 2>/dev/null | wc -l avoid flooding the screen with permission errors?"
    back: "BECAUSE 2>/dev/null discards all stderr (permission denied messages) before output reaches the terminal. THEREFORE only the clean stdout flows through the pipe to wc -l for counting."
    tags: ["redirection", "pipes"]
    difficulty: "advanced"
    why: "Combining error suppression with pipes is essential for scripting"

  - id: "ch11-03-text-editing-pipes-streams-026"
    front: "What nano shortcut cuts an entire line, and what shortcut pastes it back?"
    back: "Ctrl+K cuts the line\nCtrl+U pastes it"
    tags: ["nano"]
    difficulty: "intermediate"
