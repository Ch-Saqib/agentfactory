# Alembic Configuration for Lesson Shorts Generator

[alembic]
# Path to migration scripts
script_location = %(here)s/src/shorts_generator/database/migrations

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# Leave blank for localtime
timezone =

# Version location specification
# This defaults to <script_location>/versions
version_locations = %(here)s/src/shorts_generator/database/migrations/versions

# Version path separator
version_path_separator = os

# The output encoding used when revision files are written
# from script.py.mako
output_encoding = utf-8

# Database URL - will be overridden by env.py
# sqlalchemy.url = postgresql+asyncpg://user:password@host/database

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
