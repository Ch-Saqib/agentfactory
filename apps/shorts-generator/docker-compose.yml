version: '3.8'

services:
  # PostgreSQL Database - DISABLED (Using Neon instead)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: shorts-postgres
  #   environment:
  #     POSTGRES_DB: shorts_db
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # Redis (for Celery and caching) - DISABLED (Using Upstash instead)
  # redis:
  #   image: redis:alpine
  #   container_name: shorts-redis
  #   ports:
  #     - "6379:6379"
  #   command: redis-server --appendonly yes
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # Shorts Generator API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shorts-api
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      # Using Neon PostgreSQL (from .env) instead of local
      # Using Upstash Redis (from .env) instead of local
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src  # Live code reload - changes reflect immediately
    command: uv run uvicorn shorts_generator.main:app --host 0.0.0.0 --port 8001 --reload

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shorts-celery-worker
    env_file:
      - .env
    environment:
      # Using Neon PostgreSQL (from .env) instead of local
      # Using Upstash Redis (from .env) instead of local
      PYTHONPATH: /app/src
    depends_on:
      - api
    volumes:
      - ./src:/app/src  # Live code reload - changes reflect immediately
    command: uv run celery -A shorts_generator.workers.celery_worker worker --loglevel=info

  # Celery Beat (Scheduler - for auto-generation)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shorts-celery-beat
    env_file:
      - .env
    environment:
      # Using Neon PostgreSQL (from .env) instead of local
      # Using Upstash Redis (from .env) instead of local
      PYTHONPATH: /app/src
    depends_on:
      - api
    volumes:
      - ./src:/app/src  # Live code reload - changes reflect immediately
    command: uv run celery -A shorts_generator.workers.celery_worker beat --loglevel=info

  # Flower (Celery Monitoring UI)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shorts-flower
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      # Using Upstash Redis (from .env) instead of local
      PYTHONPATH: /app/src
    command: uv run celery -A shorts_generator.workers.celery_worker flower --port=5555

networks:
  default:
    name: shorts-network
